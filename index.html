// 오늘의 정밀 영양 분석 (개인 맞춤)
function renderNutritionAnalysis() {
  const profile = state.settings.profile;
  const day = getDay();
  
  // 프로필 미완성 시 안내
  if (!profile.onboarded || !profile.startWeight || !profile.height) {
    return `
      <div class="coach-card" style="background:linear-gradient(135deg, var(--accent-bg) 0%, var(--gold-bg) 100%);border:1px solid var(--accent-soft);">
        <div class="coach-title"><span>📋</span> 맞춤 분석을 위해</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-bottom:10px;line-height:1.5;">
          정확한 칼로리·영양소 분석을 위해 내 정보를 먼저 등록해주세요.
        </div>
        <button class="coach-action-btn" onclick="startOnboarding()">
          <span>✦</span><span>내 정보 등록하기</span>
        </button>
      </div>
    `;
  }
  
  // 오늘 섭취량 집계
  let cal = 0, c = 0, p = 0, f = 0, exCal = 0;
  Object.values(day.foods).forEach(meal => meal.forEach(item => {
    cal += item.cal || 0; c += item.c || 0; p += item.p || 0; f += item.f || 0;
  }));
  (day.exercise || []).forEach(e => exCal += e.cal || 0);
  const netCal = cal - exCal;
  
  // 목표 계산
  const goal = state.settings.goal;
  const proteinGoal = getProteinGoal(profile);
  const remainingCal = goal - netCal;
  // 탄단지 목표 (단백 25%, 탄수 45%, 지방 30%)
  const carbGoal = Math.round(goal * 0.45 / 4);
  const fatGoal = Math.round(goal * 0.30 / 9);
  
  // 부족/초과 판단
  const proteinPct = Math.min(100, Math.round(p / proteinGoal * 100));
  const carbPct = Math.min(100, Math.round(c / carbGoal * 100));
  const fatPct = Math.min(100, Math.round(f / fatGoal * 100));
  const calPct = Math.min(100, Math.round(netCal / goal * 100));
  
  // 핵심 진단 메시지
  let diagnosis = [];
  const proteinShort = proteinGoal - Math.round(p);
  if (proteinShort > 20) {
    diagnosis.push({ type: 'warn', icon: '⚠️', text: `단백질이 ${proteinShort}g 부족해요. 근육 유지를 위해 닭가슴살, 두부, 그릭요거트를 드세요.` });
  } else if (p >= proteinGoal) {
    diagnosis.push({ type: 'good', icon: '✓', text: `단백질 목표 달성! 근육 유지에 좋아요.` });
  }
  if (netCal > goal) {
    diagnosis.push({ type: 'warn', icon: '🔴', text: `목표보다 ${Math.round(netCal - goal)}kcal 초과했어요. 남은 시간엔 가볍게.` });
  } else if (remainingCal > 300) {
    diagnosis.push({ type: 'info', icon: '💡', text: `아직 ${Math.round(remainingCal)}kcal 여유가 있어요. 단백질 위주로 채우세요.` });
  }
  if (c > carbGoal * 1.3) {
    diagnosis.push({ type: 'warn', icon: '🍚', text: `탄수화물이 많아요. 다음 끼니는 채소·단백질 위주로.` });
  }
  if (diagnosis.length === 0) {
    diagnosis.push({ type: 'good', icon: '👍', text: `균형 잘 잡혀 있어요! 이대로 유지하세요.` });
  }
  
  const bar = (pct, color, over) => `
    <div style="height:6px;background:var(--bg-primary);border-radius:3px;overflow:hidden;margin-top:4px;">
      <div style="height:100%;width:${pct}%;background:${over ? 'var(--rose)' : color};transition:width 0.4s;"></div>
    </div>
  `;
  
  return `
    <div class="coach-card" style="background:linear-gradient(135deg, var(--accent-bg) 0%, var(--bg-card) 120%);border:1px solid var(--accent-soft);">
      <div class="coach-title"><span>🎯</span> 오늘의 다이어트 처방</div>
      <div style="font-size:11px;color:var(--ink-muted);margin-bottom:14px;">${profile.name ? profile.name + '님 ' : ''}맞춤 분석 · ${profile.startWeight}kg → ${profile.targetWeight}kg 목표</div>
      
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <span style="font-size:13px;font-weight:500;">칼로리</span>
          <span style="font-size:12px;color:${netCal > goal ? 'var(--rose)' : 'var(--ink-soft)'};">${Math.round(netCal)} / ${goal} kcal</span>
        </div>
        ${bar(calPct, 'var(--accent)', netCal > goal)}
      </div>
      
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <span style="font-size:13px;font-weight:500;">단백질 ${proteinShort > 0 ? `<span style="font-size:10px;color:var(--rose);">${proteinShort}g 부족</span>` : '<span style="font-size:10px;color:var(--moss);">충분</span>'}</span>
          <span style="font-size:12px;color:var(--ink-soft);">${Math.round(p)} / ${proteinGoal} g</span>
        </div>
        ${bar(proteinPct, 'var(--moss)', false)}
      </div>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;">
            <span style="font-size:12px;">탄수화물</span>
            <span style="font-size:11px;color:var(--ink-soft);">${Math.round(c)}/${carbGoal}g</span>
          </div>
          ${bar(carbPct, '#C47A30', c > carbGoal * 1.3)}
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;">
            <span style="font-size:12px;">지방</span>
            <span style="font-size:11px;color:var(--ink-soft);">${Math.round(f)}/${fatGoal}g</span>
          </div>
          ${bar(fatPct, '#B85470', f > fatGoal * 1.3)}
        </div>
      </div>
      
      <div style="border-top:1px solid var(--border);padding-top:12px;">
        ${diagnosis.map(d => `
          <div class="insight ${d.type}" style="margin-bottom:6px;">
            <span>${d.icon}</span><span>${d.text}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// 구글시트로 하루 데이터 전송
async function syncToGoogleSheet(dateStr = state.currentDate, silent = true) {
  const gs = state.settings.googleSheet;
  if (!gs || !gs.url) return { ok: false, reason: 'URL 미설정' };
  
  const day = state.daily[dateStr];
  if (!day) return { ok: false, reason: '데이터 없음' };
  
  // 영양소 집계
  let cal = 0, c = 0, p = 0, f = 0, exCal = 0;
  const foodNames = [];
  Object.entries(day.foods || {}).forEach(([meal, items]) => {
    items.forEach(item => {
      cal += item.cal || 0; c += item.c || 0; p += item.p || 0; f += item.f || 0;
      foodNames.push(`${meal}:${item.name}`);
    });
  });
  (day.exercise || []).forEach(e => exCal += e.cal || 0);
  
  const payload = {
    user: gs.userName || '사용자',
    date: dateStr,
    calories: Math.round(cal),
    carbs: Math.round(c),
    protein: Math.round(p),
    fat: Math.round(f),
    exerciseCal: Math.round(exCal),
    netCal: Math.round(cal - exCal),
    weight: day.weight || '',
    water: day.water || 0,
    sleep: day.sleep ? day.sleep.hours : '',
    foods: foodNames.join(', '),
    conditions: (day.conditions || []).map(x => (x.tags||[]).join('/')).join(' '),
    goalType: (state.settings.profile.goalType || 'loss')
  };
  
  try {
    // Apps Script는 CORS 때문에 no-cors 모드로 전송 (응답 못 읽지만 전송은 됨)
    await fetch(gs.url, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    return { ok: true };
  } catch (err) {
    console.error('구글시트 전송 실패:', err);
    return { ok: false, reason: err.message };
  }
}

// 구글시트에서 가족 데이터 불러오기 (doGet 사용)
async function fetchFamilyData() {
  const gs = state.settings.googleSheet;
  if (!gs || !gs.url) return { ok: false, reason: 'URL 미설정' };
  
  try {
    // GET 요청으로 시트 데이터 조회 (Apps Script doGet이 JSON 반환)
    const response = await fetch(gs.url + '?action=read', {
      method: 'GET',
      redirect: 'follow'
    });
    const data = await response.json();
    return { ok: true, rows: data.rows || [] };
  } catch (err) {
    console.error('가족 데이터 조회 실패:', err);
    return { ok: false, reason: err.message };
  }
}

// 미니 선 그래프 (체중용)
function miniLineChart(series, color) {
  if (!series || series.length < 2) return '';
  const w = 300, h = 90, pad = 18;
  const vals = series.map(s => s.val);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = (max - min) || 1;
  const xStep = (w - pad*2) / (series.length - 1);
  const yScale = v => h - pad - ((v - min) / range) * (h - pad*2);
  
  let path = '', points = '';
  series.forEach((s, i) => {
    const x = pad + i * xStep;
    const y = yScale(s.val);
    path += (path ? 'L' : 'M') + `${x.toFixed(1)},${y.toFixed(1)}`;
    points += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${color}"/>`;
  });
  
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">
      <defs>
        <linearGradient id="fg${Math.random().toString(36).slice(2,7)}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${path}" stroke="${color}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      ${points}
      <text x="${pad}" y="${h-2}" font-size="8" fill="var(--ink-muted)">${series[0].date ? series[0].date.slice(5) : ''}</text>
      <text x="${w-pad}" y="${h-2}" font-size="8" fill="var(--ink-muted)" text-anchor="end">${series[series.length-1].date ? series[series.length-1].date.slice(5) : ''}</text>
      <text x="2" y="12" font-size="8" fill="var(--ink-muted)">${max.toFixed(1)}</text>
      <text x="2" y="${h-pad+3}" font-size="8" fill="var(--ink-muted)">${min.toFixed(1)}</text>
    </svg>
  `;
}

// 미니 막대 그래프 (칼로리용)
function miniBarChart(series, goal) {
  if (!series || series.length < 2) return '';
  const w = 300, h = 80, pad = 18;
  const vals = series.map(s => s.val);
  const max = Math.max(...vals, goal || 0) || 1;
  const barW = (w - pad*2) / series.length * 0.6;
  const gap = (w - pad*2) / series.length;
  
  let bars = '';
  series.forEach((s, i) => {
    const x = pad + i * gap + (gap - barW)/2;
    const barH = (s.val / max) * (h - pad*2);
    const y = h - pad - barH;
    const over = goal && s.val > goal;
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0,barH).toFixed(1)}" rx="2" fill="${over ? 'var(--rose)' : 'var(--moss)'}"/>`;
  });
  
  // 목표선
  let goalLine = '';
  if (goal) {
    const gy = h - pad - (goal / max) * (h - pad*2);
    goalLine = `<line x1="${pad}" y1="${gy.toFixed(1)}" x2="${w-pad}" y2="${gy.toFixed(1)}" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/><text x="${w-pad}" y="${(gy-3).toFixed(1)}" font-size="8" fill="var(--accent)" text-anchor="end">목표 ${goal}</text>`;
  }
  
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">
      ${bars}
      ${goalLine}
      <text x="${pad}" y="${h-2}" font-size="8" fill="var(--ink-muted)">${series[0].date ? series[0].date.slice(5) : ''}</text>
      <text x="${w-pad}" y="${h-2}" font-size="8" fill="var(--ink-muted)" text-anchor="end">${series[series.length-1].date ? series[series.length-1].date.slice(5) : ''}</text>
    </svg>
  `;
}

// 부족 영양소 기반 추천 카테고리 결정
function getRecommendedCategories() {
  const day = getDay();
  let p = 0, c = 0, f = 0, cal = 0;
  Object.values(day.foods).forEach(meal => meal.forEach(item => {
    p += item.p || 0; c += item.c || 0; f += item.f || 0; cal += item.cal || 0;
  }));
  
  const profile = state.settings.profile;
  const proteinGoal = getProteinGoal(profile);
  
  const cats = [];
  // 단백질 부족하면 단백질 우선
  if (p < proteinGoal * 0.7) cats.push('protein');
  // 항상 슈퍼푸드는 추천
  cats.push('superfood');
  // 탄수화물 적으면
  if (c < 100) cats.push('carb');
  cats.push('nuts');
  cats.push('etc');
  return [...new Set(cats)];
}

  const cats = getRecommendedCategories();

  html += `

        📢 ${COUPANG_DISCLOSURE}

function renderCoachChatLog() {
  const log = document.getElementById('coach-chat-log');
  if (!log) return;
  const day = getDay();
  if (!day.chat || day.chat.length === 0) {
    log.innerHTML = `<div style="text-align:center;padding:20px 10px;color:var(--ink-muted);font-size:12px;">아직 대화가 없어요.<br>아래에 질문을 입력해보세요.</div>`;
    return;
  }
  log.innerHTML = day.chat.map(m => `
    <div class="chat-msg ${m.role}">
      <div class="chat-bubble ${m.role}">${m.text.replace(/\n/g, '<br>')}</div>
    </div>
  `).join('');
  log.scrollTop = log.scrollHeight;
}

async function coachChatSend() {
  const input = document.getElementById('coach-chat-text');
  const btn = document.getElementById('coach-chat-send');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  
  // 사용자 메시지 즉시 표시 + 로딩
  await sendCoachMessage(text, {
    speak: true,
    onUpdate: () => {
      renderCoachChatLog();
      // 코치 응답 대기 중 표시
      const log = document.getElementById('coach-chat-log');
      const day = getDay();
      if (log && day.chat[day.chat.length-1].role === 'user') {
        log.innerHTML += `<div class="chat-msg coach"><div class="chat-bubble coach" style="opacity:0.6;">생각 중...</div></div>`;
        log.scrollTop = log.scrollHeight;
      }
    }
  });
  
  if (btn) { btn.disabled = false; btn.textContent = '전송'; }
}

  }
  
  await sendCoachMessage(text, {
    speak: true,
    onUpdate: () => {
      const day = getDay();
      const last = day.chat[day.chat.length - 1];
      if (last && last.role === 'coach' && answerEl) {
        answerEl.innerHTML = last.text.replace(/\n/g, '<br>');
      }
    }
  });
  
  if (btn) btn.disabled = false;
}

async function coachDailyReview() {
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '평가 중...'; }
  await requestDailyReview({
    speak: true,
    onUpdate: () => {
      renderCoachChatLog();
      const log = document.getElementById('coach-chat-log');
      const day = getDay();
      if (log && day.chat[day.chat.length-1].role === 'user') {
        log.innerHTML += `<div class="chat-msg coach"><div class="chat-bubble coach" style="opacity:0.6;">오늘 하루 돌아보는 중...</div></div>`;
        log.scrollTop = log.scrollHeight;
      }
    }
  });
  if (btn) { btn.disabled = false; btn.textContent = '오늘 평가'; }
}

function renderStats() {
  const days = [];
  const today = new Date(state.currentDate);
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const data = state.daily[ds] || { foods: {}, weight: null, water: 0, exercise: [], sleep: null };

    let cal = 0, c = 0, p = 0, f = 0, exCal = 0;
    Object.values(data.foods || {}).forEach(meal => {
      meal.forEach(item => {
        cal += item.cal || 0;
        c += item.c || 0;
        p += item.p || 0;
        f += item.f || 0;
      });
    });
    (data.exercise || []).forEach(e => exCal += e.cal || 0);

    days.push({
      date: ds,
      label: ['일','월','화','수','목','금','토'][d.getDay()],
      cal: Math.round(cal),
      net: Math.round(cal - exCal),
      c, p, f, exCal,
      weight: data.weight,
      water: data.water || 0,
      sleep: data.sleep
    });
  }

  const recorded = days.filter(d => d.cal > 0);
  const avgCal = recorded.length > 0 ? Math.round(recorded.reduce((s, d) => s + d.net, 0) / recorded.length) : 0;
  const totalC = days.reduce((s, d) => s + d.c, 0);
  const totalP = days.reduce((s, d) => s + d.p, 0);
  const totalF = days.reduce((s, d) => s + d.f, 0);
  const macroCal = totalC * 4 + totalP * 4 + totalF * 9;
  const cPct = macroCal > 0 ? Math.round(totalC * 4 / macroCal * 100) : 0;
  const pPct = macroCal > 0 ? Math.round(totalP * 4 / macroCal * 100) : 0;
  const fPct = macroCal > 0 ? Math.round(totalF * 9 / macroCal * 100) : 0;

  const sleepDays = days.filter(d => d.sleep);
  const avgSleep = sleepDays.length > 0 ? (sleepDays.reduce((s, d) => s + d.sleep.hours, 0) / sleepDays.length).toFixed(1) : '—';
  const waterAvg = Math.round(days.reduce((s, d) => s + d.water, 0) / 7);

  // 인사이트 분석
  const insights = [];
  if (avgCal > state.settings.goal) {
    insights.push({ type: 'warn', text: `평균 ${avgCal - state.settings.goal} kcal 초과 섭취 중이에요` });
  } else if (avgCal > 0 && avgCal < state.settings.goal - 100) {
    insights.push({ type: 'good', text: `목표 대비 ${state.settings.goal - avgCal} kcal 적게 섭취 중. 좋아요!` });
  }
  if (cPct > 60) {
    insights.push({ type: 'warn', text: `탄수화물 비율 ${cPct}% - 살 빠지기 어려운 비율 (권장 45-55%)` });
  }
  if (pPct < 15 && pPct > 0) {
    insights.push({ type: 'warn', text: `단백질 ${pPct}% - 부족해요. 닭가슴살, 두부, 계란 늘리세요 (권장 25-30%)` });
  }
  if (fPct > 35) {
    insights.push({ type: 'warn', text: `지방 ${fPct}% - 너무 많아요 (권장 20-30%)` });
  }
  if (avgCal > 0 && avgCal < 1000) {
    insights.push({ type: 'warn', text: '너무 적게 먹고 있어요. 대사 저하로 오히려 살 안 빠질 수 있음' });
  }
  if (sleepDays.length >= 3) {
    const lowSleepDays = sleepDays.filter(d => d.sleep.hours < 6).length;
    if (lowSleepDays >= 2) {
      insights.push({ type: 'warn', text: `최근 ${lowSleepDays}일 6시간 미만 수면 - 식욕호르몬 증가로 다이어트 방해됨` });
    } else if (avgSleep >= 7) {
      insights.push({ type: 'good', text: `평균 수면 ${avgSleep}시간 - 다이어트에 좋은 수면 패턴이에요` });
    }
  }
  if (waterAvg < 1500 && waterAvg > 0) {
    insights.push({ type: 'warn', text: `평균 ${waterAvg}ml - 물 부족. 대사가 떨어질 수 있어요` });
  }

  // 주말 vs 평일
  const weekdays = days.filter(d => { const dy = new Date(d.date).getDay(); return dy >= 1 && dy <= 5 && d.cal > 0; });
  const weekends = days.filter(d => { const dy = new Date(d.date).getDay(); return (dy === 0 || dy === 6) && d.cal > 0; });
  if (weekdays.length >= 2 && weekends.length >= 1) {
    const wdAvg = Math.round(weekdays.reduce((s,d) => s + d.net, 0) / weekdays.length);
    const weAvg = Math.round(weekends.reduce((s,d) => s + d.net, 0) / weekends.length);
    if (weAvg > wdAvg + 200) {
      insights.push({ type: 'info', text: `주말이 평일보다 평균 ${weAvg - wdAvg} kcal 더 섭취 - 주말 관리가 핵심` });
    }
  }
  
  // 시간대별 분석 (야식 패턴)
  let lateNightCal = 0;
  let lateNightDays = 0;
  let mealTimings = []; // 끼니별 평균 시간
  
  days.forEach(d => {
    const data = state.daily[d.date];
    if (!data?.foods) return;
    let dayLateCal = 0;
    Object.values(data.foods).forEach(meal => {
      meal.forEach(item => {
        if (item.time) {
          const [h, m] = item.time.split(':').map(Number);
          const hourFloat = h + m / 60;
          // 21시 이후 = 야식
          if (hourFloat >= 21 || hourFloat < 5) {
            dayLateCal += item.cal || 0;
          }
        }
      });
    });
    if (dayLateCal > 0) {
      lateNightCal += dayLateCal;
      lateNightDays++;
    }
  });
  
  if (lateNightDays >= 2) {
    const avgLate = Math.round(lateNightCal / lateNightDays);
    insights.push({ type: 'warn', text: `최근 ${lateNightDays}일 야식 패턴 (밤 9시 이후 평균 ${avgLate} kcal) - 다이어트의 큰 적` });
  }
  
  // 마지막 식사 시간 평균
  let lastMealTimes = [];
  days.forEach(d => {
    const data = state.daily[d.date];
    if (!data?.foods) return;
    let latestTime = '';
    Object.values(data.foods).forEach(meal => {
      meal.forEach(item => {
        if (item.time && item.time > latestTime) latestTime = item.time;
      });
    });
    if (latestTime) lastMealTimes.push(latestTime);
  });
  
  if (lastMealTimes.length >= 3) {
    const avgMinutes = lastMealTimes.reduce((s, t) => {
      const [h, m] = t.split(':').map(Number);
      return s + h * 60 + m;
    }, 0) / lastMealTimes.length;
    const avgH = Math.floor(avgMinutes / 60);
    const avgM = Math.round(avgMinutes % 60);
    if (avgH >= 20) {
      insights.push({ type: 'info', text: `평균 마지막 식사 시간: ${String(avgH).padStart(2,'0')}:${String(avgM).padStart(2,'0')} - 19시 이전이 다이어트에 좋아요` });
    }
  }

  // 체중 추세
  const weightDays = days.filter(d => d.weight !== null);
  let weightChange = null;
  if (weightDays.length >= 2) {
    const first = weightDays[0].weight;
    const last = weightDays[weightDays.length - 1].weight;
    weightChange = last - first;
  }

  const maxCal = Math.max(...days.map(d => d.net), state.settings.goal);

  document.getElementById('stats-content').innerHTML = `
    <div class="stat-grid" style="grid-template-columns:1fr 1fr 1fr;">
      <div class="stat-card" style="cursor:default;">
        <div class="stat-label">평균 칼로리</div>
        <div class="stat-value">${avgCal}<span class="stat-unit">kcal</span></div>
      </div>
      <div class="stat-card" style="cursor:default;">
        <div class="stat-label">평균 수면</div>
        <div class="stat-value">${avgSleep}<span class="stat-unit">시간</span></div>
      </div>
      <div class="stat-card" style="cursor:default;">
        <div class="stat-label">평균 물</div>
        <div class="stat-value">${Math.round(waterAvg/250)}<span class="stat-unit">잔</span></div>
      </div>
    </div>

    ${weightChange !== null ? `
      <div class="cal-card" style="padding:16px 18px;">
        <div class="cal-label">주간 체중 변화</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-top:6px;">
          <span class="cal-number" style="font-size:32px;color:${weightChange < 0 ? 'var(--moss)' : weightChange > 0 ? 'var(--rose)' : 'var(--ink)'};">${weightChange < 0 ? '↓' : weightChange > 0 ? '↑' : '·'} ${Math.abs(weightChange).toFixed(1)}</span>
          <span class="cal-unit">${state.settings.weightUnit}</span>
        </div>
      </div>
    ` : ''}

    <div class="cal-card" style="padding:18px;">
      <div class="cal-label" style="margin-bottom:12px;">최근 7일 칼로리</div>
      <div class="chart-row">
        ${days.map(d => `
          <div class="chart-bar">
            <div class="chart-bar-val">${d.net}</div>
            <div class="chart-bar-fill" style="height:${maxCal > 0 ? (d.net / maxCal) * 70 : 0}px;background:${d.net > state.settings.goal ? 'var(--rose)' : 'var(--accent)'};"></div>
            <div class="chart-bar-label">${d.label}</div>
          </div>
        `).join('')}
      </div>
    </div>

    ${macroCal > 0 ? `
      <div class="cal-card" style="padding:18px;">
        <div class="cal-label" style="margin-bottom:12px;">주간 영양소 비율</div>
        <div class="macro-bar">
          <div class="macro-bar-seg macro-bar-c" style="width:${cPct}%;">${cPct > 8 ? cPct + '%' : ''}</div>
          <div class="macro-bar-seg macro-bar-p" style="width:${pPct}%;">${pPct > 8 ? pPct + '%' : ''}</div>
          <div class="macro-bar-seg macro-bar-f" style="width:${fPct}%;">${fPct > 8 ? fPct + '%' : ''}</div>
        </div>
        <div class="macro-legend">
          <span><span class="legend-dot" style="background:#C47A30;"></span>탄수</span>
          <span><span class="legend-dot" style="background:#5C8A4A;"></span>단백</span>
          <span><span class="legend-dot" style="background:#B85470;"></span>지방</span>
        </div>
      </div>
    ` : ''}

    ${insights.length > 0 ? `
      <div class="cal-card" style="padding:18px;">
        <div class="cal-label" style="margin-bottom:12px;">✦ 패턴 분석</div>
        ${insights.map(i => `<div class="insight ${i.type}"><span>•</span><span>${i.text}</span></div>`).join('')}
      </div>

  `;
}

function renderWeightPage() {
  const days = [];
  const today = new Date(state.currentDate);
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const data = state.daily[ds];
    days.push({ date: ds, label: `${d.getMonth()+1}/${d.getDate()}`, weight: data?.weight || null });
  }

  const wDays = days.filter(d => d.weight);

  if (wDays.length === 0) {
    document.getElementById('weight-content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚖</div>
        <div class="empty-text">체중을 기록하면<br>변화 그래프가 보여요</div>
      </div>
      <div style="text-align:center;margin-top:20px;">
        <button class="btn btn-primary" onclick="openModal('weight')">체중 기록하기</button>
      </div>
    `;
    return;
  }

  // 7일 이동평균
  function getMA(idx, w = 7) {
    const slice = days.slice(Math.max(0, idx - w + 1), idx + 1).filter(d => d.weight);
    if (slice.length === 0) return null;
    return slice.reduce((s, d) => s + d.weight, 0) / slice.length;
  }

  const weights = wDays.map(d => d.weight);
  const minW = Math.min(...weights) - 0.5;
  const maxW = Math.max(...weights) + 0.5;

  const first = wDays[0].weight;
  const last = wDays[wDays.length - 1].weight;
  const totalChange = last - first;

  // 7일 변화
  let weekChange = null;
  if (wDays.length >= 2) {
    const recent = wDays.slice(-7);
    if (recent.length >= 2) {
      weekChange = recent[recent.length - 1].weight - recent[0].weight;
    }
  }

  // SVG 차트
  const w = 360, h = 180, pad = 30;
  const xStep = (w - pad * 2) / (days.length - 1);
  const yScale = (val) => h - pad - ((val - minW) / (maxW - minW)) * (h - pad * 2);

  let pathData = '';
  let maPathData = '';
  let points = '';
  days.forEach((d, i) => {
    const x = pad + i * xStep;
    if (d.weight) {
      const y = yScale(d.weight);
      pathData += (pathData ? 'L' : 'M') + `${x},${y}`;
      points += `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent)"/>`;
    }
    const ma = getMA(i);
    if (ma) {
      const y = yScale(ma);
      maPathData += (maPathData ? 'L' : 'M') + `${x},${y}`;
    }
  });

  document.getElementById('weight-content').innerHTML = `
    <div class="stat-grid" style="grid-template-columns:1fr 1fr;">
      <div class="stat-card" style="cursor:default;">
        <div class="stat-label">현재 체중</div>
        <div class="stat-value">${last.toFixed(1)}<span class="stat-unit">${state.settings.weightUnit}</span></div>
      </div>
      <div class="stat-card" style="cursor:default;">
        <div class="stat-label">${wDays.length}일간 변화</div>
        <div class="stat-value" style="color:${totalChange < 0 ? 'var(--moss)' : totalChange > 0 ? 'var(--rose)' : 'var(--ink)'};">
          ${totalChange < 0 ? '↓' : totalChange > 0 ? '↑' : '·'} ${Math.abs(totalChange).toFixed(1)}<span class="stat-unit">${state.settings.weightUnit}</span>
        </div>
      </div>
    </div>

    <div class="cal-card" style="padding:20px 16px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;">
        <div class="cal-label">최근 30일</div>
        <div style="font-size:11px;color:var(--ink-muted);">— 일별 · ◦ 7일 평균</div>
      </div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${maPathData ? `<path d="${maPathData} L ${pad + (days.length-1) * xStep},${h-pad} L ${pad},${h-pad} Z" fill="url(#areaGrad)"/>` : ''}
        ${maPathData ? `<path d="${maPathData}" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
        ${pathData ? `<path d="${pathData}" stroke="var(--ink-muted)" stroke-width="1" stroke-dasharray="2,2" fill="none" opacity="0.5"/>` : ''}
        ${points}
        <text x="${pad}" y="${h-8}" font-size="9" fill="var(--ink-muted)">${days[0].label}</text>
        <text x="${w-pad}" y="${h-8}" font-size="9" fill="var(--ink-muted)" text-anchor="end">${days[days.length-1].label}</text>
      </svg>
    </div>

    ${weekChange !== null ? `
      <div class="cal-card" style="padding:18px;">
        <div class="cal-label">이번 주 변화</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-top:6px;">
          <span class="cal-number" style="font-size:28px;color:${weekChange < 0 ? 'var(--moss)' : weekChange > 0 ? 'var(--rose)' : 'var(--ink)'};">${weekChange < 0 ? '↓' : weekChange > 0 ? '↑' : '·'} ${Math.abs(weekChange).toFixed(2)}</span>
          <span class="cal-unit">${state.settings.weightUnit}</span>
        </div>
        <div style="font-size:12px;color:var(--ink-muted);margin-top:6px;">
          ${weekChange < -0.7 ? '🎉 좋은 속도예요! 너무 빠르면 요요 주의' : weekChange < -0.2 ? '✓ 적절한 감량 속도' : weekChange < 0.2 ? '정체기. 수면/스트레스/생리주기 확인하세요' : '체중 증가 추세. 식단 점검 필요'}
        </div>
      </div>
    ` : ''}

    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-primary" onclick="openModal('weight')">오늘 체중 기록</button>
    </div>
  `;
}

// TTS - OpenAI 우선, 폴백으로 브라우저
async function speakText(text, options = {}) {
  if (!state.settings.profile.voiceEnabled && !options.force) return;
  
  // OpenAI TTS 시도
  if (state.settings.openaiKey && state.settings.openaiKey.startsWith('sk-')) {
    try {
      const response = await fetch('https://api.openai.com/v1/audio/speech', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${state.settings.openaiKey}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'tts-1',
          voice: 'nova',
          input: text,
          speed: 1.0
        })
      });
      
      if (response.ok) {
        const audioBlob = await response.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        const audio = new Audio(audioUrl);
        audio.play();
        return new Promise(resolve => {
          audio.onended = () => {
            URL.revokeObjectURL(audioUrl);
            resolve();
          };
          audio.onerror = () => resolve();
        });
      }
    } catch (e) {
      console.warn('OpenAI TTS 실패, 브라우저 폴백:', e);
    }
  }
  
  // 폴백: 브라우저 내장 TTS
  if ('speechSynthesis' in window) {
    return new Promise(resolve => {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ko-KR';
      utterance.rate = 1.0;
      utterance.onend = resolve;
      utterance.onerror = resolve;
      window.speechSynthesis.speak(utterance);
    });
  }
}

function stopSpeaking() {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
  }
  document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });
}

// BMR 계산 (Mifflin-St Jeor)
function calculateBMR(profile) {
  const { gender, age, height, startWeight } = profile;
  if (!age || !height || !startWeight) return null;
  if (gender === '여성') {
    return Math.round(10 * startWeight + 6.25 * height - 5 * age - 161);
  } else {
    return Math.round(10 * startWeight + 6.25 * height - 5 * age + 5);
  }
}

// 활동량 계수
const ACTIVITY_MULTIPLIERS = {
  sedentary: 1.2,    // 거의 안 움직임
  light: 1.375,      // 가벼운 활동 (주 1-3회)
  moderate: 1.55,    // 보통 활동 (주 3-5회)
  active: 1.725      // 활동적 (주 6-7회)
};

const ACTIVITY_LABELS = {
  sedentary: '거의 안 움직임 (사무직, 운동 안 함)',
  light: '가벼운 활동 (주 1-3회 운동)',
  moderate: '보통 활동 (주 3-5회 운동)',
  active: '활동적 (주 6-7회 운동)'
};

function calculateTargetCalories(profile) {
  const bmr = calculateBMR(profile);
  if (!bmr) return null;
  const tdee = bmr * (ACTIVITY_MULTIPLIERS[profile.activityLevel] || 1.375);
  const goalType = profile.goalType || 'loss';
  if (goalType === 'maintain') {
    return Math.round(tdee); // 유지: TDEE 그대로
  } else if (goalType === 'gain') {
    // 증량: 하루 약 +300~350kcal (주당 약 0.25-0.3kg 근육 위주 증가)
    return Math.round(tdee + 350);
  } else {
    // 감량: 페이스만큼 적자
    const deficit = (profile.goalPace * 7700) / 7;
    return Math.round(tdee - deficit);
  }
}

function getProteinGoal(profile) {
  if (!profile || !profile.startWeight) return 80;
  const goalType = profile.goalType || 'loss';
  // 증량: 2.0g/kg, 감량: 1.6g/kg, 유지: 1.4g/kg
  const factor = goalType === 'gain' ? 2.0 : (goalType === 'maintain' ? 1.4 : 1.6);
  return Math.round(profile.startWeight * factor);
}

function calculateMonthsToGoal(profile) {
  if (!profile.startWeight || !profile.targetWeight || !profile.goalPace) return null;
  const totalLoss = profile.startWeight - profile.targetWeight;
  if (totalLoss <= 0) return null;
  const weeks = totalLoss / profile.goalPace;
  return Math.round(weeks / 4.33 * 10) / 10; // months
}

async function startOnboarding() {
  onboardingStep = 0;

  onboardingData.apiKey = state.settings.apiKey || '';
  onboardingData.openaiKey = state.settings.openaiKey || '';
  document.body.style.overflow = 'hidden';
  await renderOnboardingStep();
}

async function renderOnboardingStep() {
  stopSpeaking();
  const step = ONBOARDING_STEPS[onboardingStep];
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal');
  
  const progressPct = ((onboardingStep + 1) / ONBOARDING_STEPS.length) * 100;
  
  let fieldsHtml = '';
  step.fields.forEach(field => {
    const currentVal = onboardingData[field.key];
    if (field.type === 'text' || field.type === 'number' || field.type === 'password') {
      fieldsHtml += `
        <div class="form-row">
          <label class="form-label">${field.label}${field.optional ? ' (선택)' : ''}</label>
          <input type="${field.type}" data-key="${field.key}" value="${currentVal || ''}" placeholder="${field.placeholder || ''}" ${field.step ? `step="${field.step}"` : ''}>
        </div>
      `;
    } else if (field.type === 'textarea') {
      fieldsHtml += `
        <div class="form-row">
          <label class="form-label">${field.label}${field.optional ? ' (선택)' : ''}</label>
          <textarea data-key="${field.key}" placeholder="${field.placeholder || ''}" style="min-height:80px;resize:vertical;">${currentVal || ''}</textarea>
        </div>
      `;
    } else if (field.type === 'select') {
      fieldsHtml += `
        <div class="form-row">
          <label class="form-label">${field.label}</label>
          <select data-key="${field.key}">
            ${field.options.map(o => `<option value="${o.v}" ${currentVal === o.v ? 'selected' : ''}>${o.l}</option>`).join('')}
          </select>
        </div>
      `;
    } else if (field.type === 'radio') {
      const val = currentVal !== null && currentVal !== undefined ? currentVal : field.default;
      fieldsHtml += `
        <div class="form-row">
          <label class="form-label">${field.label}</label>
          <div style="display:flex;flex-direction:column;gap:6px;" data-radio-group="${field.key}">
            ${field.options.map(o => `
              <button type="button" class="radio-option ${String(val) === String(o.v) ? 'selected' : ''}" data-value="${o.v}" onclick="selectRadioOption(this,'${field.key}',${typeof o.v === 'string' ? `'${o.v}'` : o.v})">
                ${o.l}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    } else if (field.type === 'checkbox') {
      const vals = Array.isArray(currentVal) ? currentVal : [];
      fieldsHtml += `
        <div class="form-row">
          <label class="form-label">${field.label}</label>
          <div style="display:flex;flex-wrap:wrap;gap:6px;" data-checkbox-group="${field.key}">
            ${field.options.map(o => `
              <button type="button" class="cond-chip ${vals.includes(o.v) ? 'selected' : ''}" data-value="${o.v}" onclick="toggleCheckboxOption(this,'${field.key}','${o.v}')">${o.l}</button>
            `).join('')}
          </div>
        </div>
      `;
    }
  });
  
  modal.innerHTML = `
    <div style="position:relative;margin-bottom:18px;">
      <div style="height:4px;background:var(--bg-secondary);border-radius:2px;overflow:hidden;margin-bottom:14px;">

      <button class="btn btn-primary" onclick="nextOnboardingStep()">${step.nextLabel || (onboardingStep === ONBOARDING_STEPS.length - 1 ? '완료' : '다음')}</button>
    </div>

  overlay.classList.add('show');
  
  // 음성 안내 자동 재생 (사용자가 voice 비활성화하지 않았을 경우)
  if (!step.skipSpeak && state.settings.profile.voiceEnabled !== false) {
    setTimeout(() => speakText(step.message), 300);
  }
}

function selectRadioOption(el, key, value) {
  const group = el.parentElement;
  group.querySelectorAll('.radio-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  onboardingData[key] = value;
}

function toggleCheckboxOption(el, key, value) {
  el.classList.toggle('selected');
  if (!Array.isArray(onboardingData[key])) onboardingData[key] = [];
  const idx = onboardingData[key].indexOf(value);
  if (idx >= 0) onboardingData[key].splice(idx, 1);
  else onboardingData[key].push(value);
}

function collectFieldsFromStep() {
  const step = ONBOARDING_STEPS[onboardingStep];
  for (const field of step.fields) {
    if (field.type === 'text' || field.type === 'number' || field.type === 'password' || field.type === 'textarea') {
      const el = document.querySelector(`[data-key="${field.key}"]`);
      if (!el) continue;
      let val = el.value.trim();
      if (field.type === 'number' && val) val = parseFloat(val);
      if (field.required && !val) {
        alert(`${field.label}을(를) 입력해주세요`);
        el.focus();
        return false;
      }
      onboardingData[field.key] = val;
    } else if (field.type === 'select') {
      const el = document.querySelector(`select[data-key="${field.key}"]`);
      if (el) onboardingData[field.key] = el.value;
    }
    // radio와 checkbox는 클릭 시 바로 저장됨
    if (field.type === 'radio' && field.required) {
      if (onboardingData[field.key] === null || onboardingData[field.key] === undefined || onboardingData[field.key] === '') {
        if (field.default !== undefined) onboardingData[field.key] = field.default;
        else { alert(`${field.label}을(를) 선택해주세요`); return false; }
      }
    }
  }
  return true;
}

async function nextOnboardingStep() {
  if (onboardingStep > 0 && !collectFieldsFromStep()) return;
  
  // API 키 단계라면 즉시 저장 (다음 단계에서 음성 사용을 위해)
  if (ONBOARDING_STEPS[onboardingStep].id === 'apiKeys') {
    state.settings.apiKey = onboardingData.apiKey || '';
    state.settings.openaiKey = onboardingData.openaiKey || '';
    await saveAll();
  }
  
  if (onboardingStep === ONBOARDING_STEPS.length - 1) {
    await completeOnboarding();
    return;
  }
  
  onboardingStep++;
  await renderOnboardingStep();
}

async function prevOnboardingStep() {
  if (onboardingStep > 0) {
    onboardingStep--;
    await renderOnboardingStep();
  }
}

function skipOnboarding() {
  if (!confirm('나중에 설정 메뉴에서 직접 입력할 수 있어요. 건너뛸까요?')) return;
  state.settings.profile.onboarded = true;
  saveAll();
  closeModal();
  document.body.style.overflow = '';
  render();
}

async function completeOnboarding() {
  // 프로필 저장
  state.settings.profile = {
    ...state.settings.profile,
    onboarded: true,
    name: onboardingData.name || '',
    gender: onboardingData.gender || '여성',
    age: parseFloat(onboardingData.age) || null,
    height: parseFloat(onboardingData.height) || null,
    startWeight: parseFloat(onboardingData.startWeight) || null,
    targetWeight: parseFloat(onboardingData.targetWeight) || null,
    activityLevel: onboardingData.activityLevel || 'light',
    goalType: onboardingData.goalType || 'loss',
    goalPace: parseFloat(onboardingData.goalPace) || 0.5,
    allergies: onboardingData.allergies || [],
    avoidFoods: onboardingData.avoidFoods || '',
    preferredStyle: onboardingData.preferredStyle || [],
    exerciseHabit: onboardingData.exerciseHabit || 'none',
    dietHistory: onboardingData.dietHistory || '',
    voiceEnabled: onboardingData.voiceEnabled !== false
  };
  
  state.settings.apiKey = onboardingData.apiKey || state.settings.apiKey || '';
  state.settings.openaiKey = onboardingData.openaiKey || state.settings.openaiKey || '';
  
  // 목표 칼로리 자동 계산
  const targetCal = calculateTargetCalories(state.settings.profile);
  if (targetCal) state.settings.goal = Math.max(1200, targetCal);
  
  // 시작 체중을 오늘 체중으로 기록
  if (state.settings.profile.startWeight) {
    getDay().weight = state.settings.profile.startWeight;
  }
  
  await saveAll();
  
  // 분석 결과 화면
  await showAnalysisResult();
}

    <div style="background:var(--accent-bg);padding:14px;border-radius:var(--radius);margin-bottom:14px;">
      <div style="font-size:11px;color:var(--accent);letter-spacing:0.1em;margin-bottom:6px;">기초대사량 (BMR)</div>
      <div style="font-family:var(--font-display);font-size:24px;font-weight:500;">${bmr || '—'} <span style="font-size:13px;color:var(--ink-soft);">kcal</span></div>
      <div style="font-size:11px;color:var(--ink-muted);margin-top:4px;">가만히 있어도 소모되는 칼로리예요</div>
    </div>
    
    <div style="background:var(--moss-bg);padding:14px;border-radius:var(--radius);margin-bottom:14px;">
      <div style="font-size:11px;color:var(--moss);letter-spacing:0.1em;margin-bottom:6px;">하루 활동 소모량 (TDEE)</div>
      <div style="font-family:var(--font-display);font-size:24px;font-weight:500;">${tdee || '—'} <span style="font-size:13px;color:var(--ink-soft);">kcal</span></div>
      <div style="font-size:11px;color:var(--ink-muted);margin-top:4px;">활동량 고려한 하루 소모 칼로리예요</div>
    </div>
    
    <div style="background:linear-gradient(135deg, var(--gold-bg) 0%, var(--accent-bg) 100%);padding:16px;border-radius:var(--radius);margin-bottom:14px;border:1px solid var(--accent-soft);">
      <div style="font-size:11px;color:var(--accent);letter-spacing:0.1em;margin-bottom:6px;">⭐ 권장 하루 섭취 칼로리 (${targetDesc})</div>
      <div style="font-family:var(--font-display);font-size:32px;font-weight:500;color:var(--accent);">${target || '—'} <span style="font-size:14px;">kcal</span></div>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:6px;line-height:1.5;">
        ${calorieNote}
      </div>
    </div>
    
    ${months && goalType !== 'maintain' ? `
      <div style="background:var(--bg-secondary);padding:14px;border-radius:var(--radius);margin-bottom:14px;text-align:center;">
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:6px;">목표까지 예상 기간</div>
        <div style="font-family:var(--font-display);font-size:20px;font-weight:500;">${months}개월 후</div>
        <div style="font-size:11px;color:var(--ink-muted);margin-top:4px;">${p.startWeight}kg → ${p.targetWeight}kg (${weightDiff > 0 ? '+' : ''}${weightDiff.toFixed(1)}kg)</div>
      </div>
    ` : ''}
    
    <div style="font-size:12px;color:var(--ink-soft);background:var(--bg-secondary);padding:12px;border-radius:var(--radius-sm);line-height:1.6;margin-bottom:16px;">
      ${tips}
    </div>
    
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="finishOnboarding()" style="width:100%;">시작하기 ✨</button>
    </div>
  `;
  
  // 음성 안내 (목표별)
  if (state.settings.profile.voiceEnabled !== false) {
    let goalSpeech = '';
    if (goalType === 'gain') {
      goalSpeech = `근육을 늘리시려면 권장 하루 섭취 칼로리는 ${target}칼로리예요. 소모량보다 조금 더 드시는 게 핵심이에요. 단백질은 하루 ${proteinGoal}그램 이상, 웨이트 운동과 충분한 수면을 병행하시면 좋아요.`;
    } else if (goalType === 'maintain') {
      goalSpeech = `현 체중을 유지하시려면 하루 ${target}칼로리가 적당해요. 단백질은 하루 ${proteinGoal}그램으로 근육을 지키시고, 규칙적으로 운동하세요.`;
    } else {
      goalSpeech = `권장 하루 섭취 칼로리는 ${target}칼로리이고, 단백질은 하루 ${proteinGoal}그램 이상 드시는 게 좋아요. ${months ? `목표 체중까지 약 ${months}개월 예상돼요. ` : ''}무리하지 말고 천천히 시작해볼까요?`;
    }
    const speech = `${p.name ? p.name + '님, ' : ''}분석이 완료됐어요. 기초대사량은 ${bmr}칼로리, 하루 소모량은 ${tdee}칼로리예요. ${goalSpeech}`;
    setTimeout(() => speakText(speech), 500);
  }
}

function finishOnboarding() {
  stopSpeaking();
  closeModal();
  document.body.style.overflow = '';
  render();
}

// ============================================================
// 초기화
// ============================================================
loadAll();
setupSpeech();
render();

// 첫 접속 시 자동 온보딩
if (!state.settings.profile.onboarded) {
  setTimeout(() => startOnboarding(), 400);
}
</script>
</body>
</html>
