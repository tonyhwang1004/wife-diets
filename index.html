<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAF7F2">
<title>다이어트 다이어리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Gowun+Dodum&family=Noto+Serif+KR:wght@300..900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #FAF7F2;
    --bg-card: #FFFFFF;
    --bg-secondary: #F2EDE5;
    --bg-tertiary: #E8E1D3;
    --ink: #2A2520;
    --ink-soft: #6B635A;
    --ink-muted: #9C9286;
    --accent: #B8542E;
    --accent-soft: #E8D5C4;
    --accent-bg: #FAEDE3;
    --moss: #5C6B3A;
    --moss-bg: #E8EDD9;
    --rose: #B85470;
    --rose-bg: #F5E0E6;
    --sky: #4A6B7C;
    --sky-bg: #DCE7ED;
    --gold: #B8901E;
    --gold-bg: #F5E8C6;
    --border: rgba(42, 37, 32, 0.08);
    --border-strong: rgba(42, 37, 32, 0.15);
    --radius-sm: 8px;
    --radius: 14px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 2px rgba(42, 37, 32, 0.04);
    --shadow: 0 2px 12px rgba(42, 37, 32, 0.06);
    --font-display: 'Fraunces', 'Noto Serif KR', serif;
    --font-body: 'Gowun Dodum', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1A1714;
      --bg-card: #252119;
      --bg-secondary: #2E2920;
      --bg-tertiary: #3A3528;
      --ink: #F0EBE0;
      --ink-soft: #B8B0A2;
      --ink-muted: #80786C;
      --accent: #E89B6E;
      --accent-soft: #4A3526;
      --accent-bg: #382820;
      --moss: #A8B57A;
      --moss-bg: #2A3220;
      --rose: #E59AAA;
      --rose-bg: #3A2530;
      --sky: #94B0BD;
      --sky-bg: #1F2D33;
      --gold: #E5C56E;
      --gold-bg: #3A301A;
      --border: rgba(240, 235, 224, 0.08);
      --border-strong: rgba(240, 235, 224, 0.15);
    }
  }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 100px;
    position: relative;
  }
  h1, h2, h3 { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }
  button { font-family: var(--font-body); cursor: pointer; border: none; background: none; color: inherit; font-size: inherit; }
  input, select, textarea {
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink);
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  /* 헤더 */
  .header {
    padding: 24px 4px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header-title {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .header-sub {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .header-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  /* 날짜 네비게이션 */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .date-arrow {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg-secondary);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .date-display {
    text-align: center;
    flex: 1;
  }
  .date-main {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
  }
  .date-sub {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  /* 칼로리 카드 */
  .cal-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 22px 20px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .cal-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: var(--accent-bg);
    border-radius: 50%;
    opacity: 0.4;
  }
  .cal-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    position: relative;
  }
  .cal-main {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin: 6px 0 14px;
    position: relative;
  }
  .cal-number {
    font-family: var(--font-display);
    font-size: 44px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .cal-unit { font-size: 14px; color: var(--ink-soft); }
  .cal-goal {
    margin-left: auto;
    text-align: right;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .cal-goal-num { font-family: var(--font-display); font-size: 15px; color: var(--ink); }
  .progress {
    height: 4px;
    background: var(--bg-secondary);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-bar.over { background: var(--rose); }
  .macros {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    position: relative;
  }
  .macro {
    text-align: center;
    padding: 10px 8px;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
  }
  .macro-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 4px;
  }
  .macro-val {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
  }
  .macro-pct {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  /* 스탯 그리드 (체중/물/운동/수면) */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .stat-card:active { transform: scale(0.98); }
  .stat-card:hover { border-color: var(--border-strong); }
  .stat-card.weight { background: linear-gradient(135deg, var(--bg-card) 0%, var(--sky-bg) 200%); }
  .stat-card.water { background: linear-gradient(135deg, var(--bg-card) 0%, var(--sky-bg) 200%); }
  .stat-card.exercise { background: linear-gradient(135deg, var(--bg-card) 0%, var(--moss-bg) 200%); }
  .stat-card.sleep { background: linear-gradient(135deg, var(--bg-card) 0%, var(--rose-bg) 200%); }
  .stat-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px;
    font-size: 16px;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    margin-top: 2px;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .stat-unit { font-size: 12px; color: var(--ink-soft); font-family: var(--font-body); }
  .stat-trend {
    font-size: 11px;
    margin-top: 4px;
    color: var(--ink-muted);
  }
  .trend-down { color: var(--moss); }
  .trend-up { color: var(--rose); }

  /* AI 입력 카드 */
  .ai-card {
    background: linear-gradient(135deg, var(--accent-bg) 0%, var(--gold-bg) 100%);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .ai-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .ai-icon { font-size: 16px; }
  .ai-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 500;
    font-style: italic;
  }
  .ai-hint {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 10px;
    font-style: italic;
  }
  .ai-textarea {
    background: var(--bg-card);
    border-color: transparent;
    min-height: 56px;
    resize: vertical;
    margin-bottom: 8px;
  }
  .ai-buttons {
    display: flex;
    gap: 8px;
  }
  .btn-voice {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--ink);
  }
  .btn-voice.recording {
    background: var(--rose);
    color: white;
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .btn-submit {
    flex: 1;
    background: var(--ink);
    color: var(--bg);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-weight: 500;
  }
  .ai-status {
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-soft);
    display: none;
  }
  .ai-status.error { color: var(--rose); }

  /* 식사 리스트 */
  .meal-section { margin-bottom: 16px; }
  .meal-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 4px;
    margin-bottom: 8px;
  }
  .meal-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 500;
    font-style: italic;
    color: var(--ink);
  }
  .meal-cal {
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
  }
  .food-item {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--border);
  }
  .food-time {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 4px 8px;
    border-radius: 6px;
    min-width: 44px;
    text-align: center;
    cursor: pointer;
    letter-spacing: 0.02em;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .food-time:hover {
    background: var(--accent-soft);
  }
  .food-time-empty {
    color: var(--ink-muted);
    background: var(--bg-secondary);
  }
  .food-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .food-detail {
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.02em;
  }
  .food-delete {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg-secondary);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--ink-soft);
  }

  /* 코치 대화 UI */
  .coach-chat-log {
    max-height: 320px;
    overflow-y: auto;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-msg {
    display: flex;
    width: 100%;
  }
  .chat-msg.user { justify-content: flex-end; }
  .chat-msg.coach { justify-content: flex-start; }
  .chat-bubble {
    max-width: 82%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .chat-bubble.user {
    background: var(--ink);
    color: var(--bg);
    border-bottom-right-radius: 4px;
  }
  .chat-bubble.coach {
    background: var(--bg-card);
    color: var(--ink);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .coach-chat-input {
    display: flex;
    gap: 6px;
  }
  .coach-chat-input input {
    flex: 1;
    background: var(--bg-card);
    border-color: transparent;
  }
  .coach-chat-input button {
    flex-shrink: 0;
    padding: 10px 16px;
    background: var(--ink);
    color: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
  }
  .coach-quick-q {
    flex: 1;
    padding: 8px 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 11px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .coach-quick-q:hover { border-color: var(--accent); color: var(--accent); }

  /* 사진 수집 카드 */
  .photo-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .photo-thumbs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .photo-thumb {
    position: relative;
    width: 72px; height: 72px;
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .photo-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    cursor: pointer;
  }
  .photo-thumb-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 9px;
    text-align: center;
    padding: 2px;
  }
  .photo-thumb-del {
    position: absolute;
    top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 50%;
    font-size: 12px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-add-btn {
    width: 100%;
    padding: 12px;
    background: var(--bg-secondary);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .photo-add-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 라디오 옵션 (온보딩용) */
  .radio-option {
    padding: 12px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: block;
    width: 100%;
  }
  .radio-option:hover { border-color: var(--accent); }
  .radio-option.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* 빠른 액션 버튼 */
  .quick-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .quick-action-btn {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 14px;
    border: 1px solid var(--border);
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .quick-action-btn:active { transform: scale(0.97); }
  .condition-btn {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--rose-bg) 200%);
  }
  .recommend-btn {
    background: linear-gradient(135deg, var(--bg-card) 0%, var(--gold-bg) 200%);
  }
  .qa-icon {
    font-size: 20px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: var(--bg-secondary);
    flex-shrink: 0;
  }
  .condition-btn .qa-icon { color: var(--rose); }
  .recommend-btn .qa-icon { color: var(--gold); }
  .qa-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .qa-sub {
    font-size: 10px;
    color: var(--ink-muted);
    line-height: 1.2;
  }

  /* 몸상태 기록 카드 */
  .condition-item {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--border);
    border-left: 3px solid var(--rose);
  }
  .condition-time {
    font-family: var(--font-display);
    font-size: 11px;
    color: var(--rose);
    background: var(--rose-bg);
    padding: 3px 7px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .condition-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.4;
  }
  .condition-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .condition-tag {
    font-size: 10px;
    padding: 2px 6px;
    background: var(--rose-bg);
    color: var(--rose);
    border-radius: 4px;
  }
  
  /* 컨디션 선택 그리드 */
  .cond-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }
  .cond-chip {
    padding: 8px 4px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .cond-chip:hover { border-color: var(--accent); }
  .cond-chip.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  
  /* 코치 페이지 */
  .coach-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 18px 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .coach-card.featured {
    background: linear-gradient(135deg, var(--accent-bg) 0%, var(--gold-bg) 100%);
    border-color: var(--accent-soft);
  }
  .coach-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 500;
    font-style: italic;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .coach-action-btn {
    width: 100%;
    padding: 12px;
    background: var(--ink);
    color: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .routine-step {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .routine-step:last-child { border-bottom: none; }
  .routine-time {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    min-width: 50px;
    flex-shrink: 0;
  }
  .routine-content {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
  }
  .routine-note {
    font-size: 11px;
    color: var(--ink-muted);
    margin-top: 2px;
  }
  .food-rec-item {
    padding: 12px;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
  }
  .food-rec-name {
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--accent);
  }
  .food-rec-reason {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  
  /* 누적 리포트 인사이트 */
  .insight-big {
    padding: 16px;
    border-radius: var(--radius);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .insight-big.positive {
    background: var(--moss-bg);
    color: var(--moss);
  }
  .insight-big.warning {
    background: var(--rose-bg);
    color: var(--rose);
  }
  .insight-big-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 500;
    font-style: italic;
    margin-bottom: 6px;
  }
  .insight-big-text {
    font-size: 13px;
  }

  /* 슈퍼푸드 추천 카드 */
  .superfood-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 4px;
  }
  .superfood-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .superfood-card:active { transform: scale(0.98); }
  .superfood-card:hover { border-color: var(--accent); }
  .sf-emoji {
    font-size: 28px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }
  .sf-info { flex: 1; min-width: 0; }
  .sf-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .sf-desc { font-size: 11px; color: var(--ink-soft); line-height: 1.4; margin-bottom: 4px; }
  .sf-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .sf-tag {
    font-size: 9px;
    padding: 2px 6px;
    background: var(--accent-bg);
    color: var(--accent);
    border-radius: 4px;
  }
  .sf-arrow { font-size: 18px; flex-shrink: 0; opacity: 0.7; }
  .coupang-disclosure {
    margin-top: 14px;
    padding: 10px 12px;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    font-size: 10px;
    color: var(--ink-muted);
    text-align: center;
    line-height: 1.5;
    border: 1px dashed var(--border-strong);
  }

  /* 빈 상태 */
  .empty {
    text-align: center;
    padding: 32px 16px;
    color: var(--ink-muted);
  }
  .empty-icon {
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.5;
  }
  .empty-text {
    font-size: 13px;
    font-style: italic;
  }

  /* 모달 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  @media (min-width: 480px) {
    .modal-overlay { align-items: center; padding: 20px; }
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 480px;
    max-height: 88vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease-out;
  }
  @media (min-width: 480px) {
    .modal { border-radius: var(--radius-lg); }
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    font-style: italic;
    margin-bottom: 4px;
  }
  .modal-sub {
    font-size: 12px;
    color: var(--ink-muted);
    margin-bottom: 18px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
  }
  .btn {
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
  }
  .btn-primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
    font-weight: 500;
  }
  .btn-quick {
    background: var(--bg-secondary);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    border: 1px solid var(--border);
  }
  .btn-quick.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .form-row { margin-bottom: 14px; }
  .form-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
    display: block;
  }

  /* 인사이트 */
  .insight {
    padding: 10px 14px;
    margin-bottom: 8px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
    line-height: 1.5;
  }
  .insight.warn { background: var(--rose-bg); color: var(--rose); }
  .insight.good { background: var(--moss-bg); color: var(--moss); }
  .insight.info { background: var(--sky-bg); color: var(--sky); }

  /* 차트 */
  .chart-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 100px;
    padding: 8px 0;
  }
  .chart-bar {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .chart-bar-val {
    font-size: 9px;
    color: var(--ink-muted);
  }
  .chart-bar-fill {
    width: 100%;
    background: var(--accent);
    border-radius: 3px 3px 0 0;
    min-height: 2px;
    transition: height 0.4s;
  }
  .chart-bar-label {
    font-size: 10px;
    color: var(--ink-muted);
  }

  /* 매크로 비율 바 */
  .macro-bar {
    display: flex;
    height: 22px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 8px;
  }
  .macro-bar-seg {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: white;
    font-weight: 500;
  }
  .macro-bar-c { background: #C47A30; }
  .macro-bar-p { background: #5C8A4A; }
  .macro-bar-f { background: #B85470; }
  .macro-legend {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .legend-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* 하단 탭 */
  .bottom-tabs {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 50;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 4px;
    color: var(--ink-muted);
    font-size: 10px;
    letter-spacing: 0.05em;
  }
  .tab.active { color: var(--accent); }
  .tab-icon { font-size: 18px; }

  /* 미리보기 아이템 */
  .preview-item {
    background: var(--bg-card);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .preview-item-header {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 8px;
  }
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .preview-grid > div { display: flex; flex-direction: column; gap: 2px; }
  .preview-grid input { padding: 6px 8px; font-size: 13px; text-align: center; }
  .preview-grid .form-label { font-size: 9px; margin-bottom: 2px; }

  /* 생리주기 */
  .cycle-indicator {
    padding: 12px 14px;
    background: var(--rose-bg);
    color: var(--rose);
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cycle-day {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 15px;
  }

  /* 페이지 전환 */
  .page { display: none; }
  .page.active { display: block; }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div>
    <div class="header-title">diary</div>
    <div class="header-sub">매일의 기록</div>
  </div>
  <button class="header-btn" onclick="openModal('settings')" aria-label="설정">⚙</button>
</div>

<!-- 페이지: 홈 -->
<div class="page active" id="page-home">

  <!-- 날짜 -->
  <div class="date-nav">
    <button class="date-arrow" onclick="changeDate(-1)">‹</button>
    <div class="date-display" onclick="openDatePicker()">
      <div class="date-main" id="date-main">—</div>
      <div class="date-sub" id="date-sub">—</div>
    </div>
    <button class="date-arrow" onclick="changeDate(1)">›</button>
    <input type="date" id="hidden-date" style="position: absolute; opacity: 0; pointer-events: none;">
  </div>

  <!-- 영상 제작일 알림 -->
  <div id="home-youtube-reminder"></div>

  <!-- 생리주기 알림 -->
  <div class="cycle-indicator" id="cycle-indicator" style="display:none;">
    <span>◐</span>
    <div style="flex: 1;">
      <div class="cycle-day" id="cycle-day-text">—</div>
      <div style="font-size: 11px; opacity: 0.85;" id="cycle-hint">—</div>
    </div>
  </div>

  <!-- 칼로리 요약 -->
  <div class="cal-card">
    <div class="cal-label">오늘의 섭취 칼로리</div>
    <div class="cal-main">
      <span class="cal-number" id="total-cal">0</span>
      <span class="cal-unit">kcal</span>
      <div class="cal-goal">
        <div style="font-size: 10px;">목표</div>
        <div class="cal-goal-num"><span id="goal-display">1500</span></div>
      </div>
    </div>
    <div class="progress">
      <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
    </div>
    <div class="macros">
      <div class="macro">
        <div class="macro-label">탄수</div>
        <div class="macro-val"><span id="total-c">0</span><span style="font-size:11px;color:var(--ink-muted);">g</span></div>
        <div class="macro-pct" id="pct-c">0%</div>
      </div>
      <div class="macro">
        <div class="macro-label">단백</div>
        <div class="macro-val"><span id="total-p">0</span><span style="font-size:11px;color:var(--ink-muted);">g</span></div>
        <div class="macro-pct" id="pct-p">0%</div>
      </div>
      <div class="macro">
        <div class="macro-label">지방</div>
        <div class="macro-val"><span id="total-f">0</span><span style="font-size:11px;color:var(--ink-muted);">g</span></div>
        <div class="macro-pct" id="pct-f">0%</div>
      </div>
    </div>
  </div>

  <!-- 4개 스탯 카드 -->
  <div class="stat-grid">
    <div class="stat-card weight" onclick="openModal('weight')">
      <div class="stat-icon">⚖</div>
      <div class="stat-label">체중</div>
      <div class="stat-value"><span id="weight-val">—</span><span class="stat-unit" id="weight-unit"></span></div>
      <div class="stat-trend" id="weight-trend">기록하기</div>
    </div>
    <div class="stat-card water" onclick="openModal('water')">
      <div class="stat-icon">◯</div>
      <div class="stat-label">물</div>
      <div class="stat-value"><span id="water-val">0</span><span class="stat-unit">/ 8잔</span></div>
      <div class="stat-trend" id="water-trend">— ml</div>
    </div>
    <div class="stat-card exercise" onclick="openModal('exercise')">
      <div class="stat-icon">◊</div>
      <div class="stat-label">운동</div>
      <div class="stat-value"><span id="exercise-val">0</span><span class="stat-unit">kcal</span></div>
      <div class="stat-trend" id="exercise-trend">기록하기</div>
    </div>
    <div class="stat-card sleep" onclick="openModal('sleep')">
      <div class="stat-icon">☾</div>
      <div class="stat-label">수면</div>
      <div class="stat-value"><span id="sleep-val">—</span><span class="stat-unit" id="sleep-unit"></span></div>
      <div class="stat-trend" id="sleep-trend">기록하기</div>
    </div>
  </div>

  <!-- 몸상태 빠른 기록 + 음식 추천 -->
  <div class="quick-actions">
    <button class="quick-action-btn condition-btn" onclick="openModal('condition')">
      <span class="qa-icon">♥</span>
      <div>
        <div class="qa-title">몸상태 기록</div>
        <div class="qa-sub" id="condition-summary">컨디션/소화/기분</div>
      </div>
    </button>
    <button class="quick-action-btn recommend-btn" onclick="getFoodRecommendation()">
      <span class="qa-icon">✦</span>
      <div>
        <div class="qa-title">AI 음식 추천</div>
        <div class="qa-sub">지금 뭘 먹을지 고민될 때</div>
      </div>
    </button>
  </div>

  <!-- AI 입력 -->
  <div class="ai-card">
    <div class="ai-header">
      <span class="ai-icon">✦</span>
      <span class="ai-title">AI로 빠르게 기록</span>
    </div>
    <div class="ai-hint">예) "아침에 김치찌개랑 공기밥, 점심에 비빔밥 먹었어"</div>
    <textarea class="ai-textarea" id="ai-input" placeholder="먹은 음식을 자유롭게 적거나 말해주세요..."></textarea>
    <div class="ai-buttons">
      <button class="btn-voice" id="voice-btn">
        <span>◉</span><span id="voice-label">음성</span>
      </button>
      <button class="btn-submit" id="ai-submit">
        <span>✦</span><span>AI 분석</span>
      </button>
    </div>
    <div class="ai-status" id="ai-status"></div>
  </div>

  <!-- AI 코치에게 질문 -->
  <div class="ai-card" style="background:linear-gradient(135deg, var(--rose-bg) 0%, var(--accent-bg) 100%);">
    <div class="ai-header">
      <span class="ai-icon">💬</span>
      <span class="ai-title">AI 코치에게 질문</span>
    </div>
    <div class="ai-hint">예) "지방이 좀 높지 않아?", "단백질 뭐로 채울까?"</div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="home-coach-input" placeholder="궁금한 걸 물어보세요..." style="flex:1;background:var(--bg-card);border-color:transparent;" onkeydown="if(event.key==='Enter')homeCoachAsk()">
      <button class="btn-submit" id="home-coach-send" style="flex-shrink:0;" onclick="homeCoachAsk()">
        <span>💬</span><span>질문</span>
      </button>
    </div>
    <div id="home-coach-answer" style="display:none;margin-top:10px;padding:12px;background:var(--bg-card);border-radius:var(--radius-sm);font-size:13px;line-height:1.6;"></div>
    <div style="text-align:right;margin-top:6px;">
      <button onclick="switchPage('coach')" style="font-size:11px;color:var(--accent);background:none;">코치 탭에서 대화 이어가기 →</button>
    </div>
  </div>

  <!-- 오늘 기록된 몸상태 -->
  <div id="conditions-list"></div>

  <!-- 오늘의 사진 (유튜브용) -->
  <div class="photo-card" id="photo-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="font-size:14px;font-weight:500;">📸 오늘의 사진</span>
      <span style="font-size:11px;color:var(--ink-muted);">유튜브 영상용</span>
    </div>
    <div id="photo-thumbs" class="photo-thumbs"></div>
    <button class="photo-add-btn" onclick="document.getElementById('photo-file-input').click()">
      <span style="font-size:18px;">+</span> 음식·운동 사진 추가
    </button>
    <input type="file" id="photo-file-input" accept="image/*" capture="environment" style="display:none;" onchange="handlePhotoUpload(event)">
  </div>

  <!-- 식사 리스트 -->
  <div id="meal-list"></div>
  <div class="empty" id="empty-state" style="display:none;">
    <div class="empty-icon">◇</div>
    <div class="empty-text">아직 기록이 없어요</div>
  </div>

</div>

<!-- 페이지: 통계 -->
<div class="page" id="page-stats">
  <h2 style="font-size: 22px; margin: 16px 4px;">통계 분석</h2>
  <div id="stats-content"></div>
</div>

<!-- 페이지: 체중 그래프 -->
<div class="page" id="page-weight">
  <h2 style="font-size: 22px; margin: 16px 4px;">체중 변화</h2>
  <div id="weight-content"></div>
</div>

<!-- 페이지: AI 코치 -->
<div class="page" id="page-coach">
  <h2 style="font-size: 22px; margin: 16px 4px;">AI 코치</h2>
  <div id="coach-content"></div>
</div>

<div class="page" id="page-family">
  <h2 style="font-size: 22px; margin: 16px 4px;">👨‍👩‍👧 가족 기록</h2>
  <div id="family-content"></div>
</div>

<!-- 하단 탭 -->
<div class="bottom-tabs">
  <button class="tab active" data-page="home" onclick="switchPage('home')">
    <span class="tab-icon">⌂</span><span>홈</span>
  </button>
  <button class="tab" data-page="coach" onclick="switchPage('coach')">
    <span class="tab-icon">✦</span><span>코치</span>
  </button>
  <button class="tab" data-page="stats" onclick="switchPage('stats')">
    <span class="tab-icon">◈</span><span>통계</span>
  </button>
  <button class="tab" data-page="weight" onclick="switchPage('weight')">
    <span class="tab-icon">◡</span><span>체중</span>
  </button>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>

// 상태 관리
// ============================================================
const ANTHROPIC_KEY = ''; // GitHub Pages 배포 시 사용자 입력 받음

let state = {

  settings: {

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  const today = todayStr();
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yestStr = yest.toISOString().split('T')[0];

  let main;
  if (dateStr === today) main = '오늘';
  else if (dateStr === yestStr) main = '어제';
  else main = `${d.getMonth() + 1}월 ${d.getDate()}일`;

  const sub = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${days[d.getDay()]}요일`;
  return { main, sub };
}

// 저장소 (localStorage)
// ============================================================
const STORAGE_KEY = 'wife_diet_v1';

let sheetSyncTimer = null;
function saveAll() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) { console.error(e); }
  
  // 구글시트 자동 전송 (디바운스: 마지막 변경 5초 후 1회)
  const gs = state.settings && state.settings.googleSheet;
  if (gs && gs.url && gs.autoSync !== false) {
    clearTimeout(sheetSyncTimer);
    sheetSyncTimer = setTimeout(() => {
      syncToGoogleSheet(state.currentDate, true);
    }, 5000);
  }
}

function loadAll() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      state = { ...state, ...loaded };
      // 저장된 옛날 날짜가 아니라 항상 오늘 날짜로 시작
      state.currentDate = todayStr();
      if (!state.settings) state.settings = { goal: 1500, waterGoal: 2000, weightUnit: 'kg', apiKey: '', openaiKey: '', cycle: { lastPeriod: null, length: 28, duration: 5 } };
      if (state.settings.openaiKey === undefined) state.settings.openaiKey = '';
      if (!state.settings.coupangLinks) state.settings.coupangLinks = {};
      if (!state.settings.googleSheet) state.settings.googleSheet = { url: '', userName: '', autoSync: true };
      // 저장 데이터에 없는 링크는 기본값으로 채움
      Object.keys(DEFAULT_COUPANG_LINKS).forEach(k => {
        if (!state.settings.coupangLinks[k]) state.settings.coupangLinks[k] = DEFAULT_COUPANG_LINKS[k];
      });
      if (!state.settings.profile) {
        state.settings.profile = {
          onboarded: false,
          name: '', gender: '여성', age: null, height: null,
          startWeight: null, targetWeight: null,
          activityLevel: 'light', goalType: 'loss', goalPace: 0.5,
          allergies: [], avoidFoods: '', preferredStyle: [],
          exerciseHabit: 'none', dietHistory: '', voiceEnabled: true
        };
      }
      if (state.settings.profile && !state.settings.profile.goalType) state.settings.profile.goalType = 'loss';
      if (!state.settings.cycle) state.settings.cycle = { lastPeriod: null, length: 28, duration: 5 };
      if (!state.daily) state.daily = {};
    }
  } catch (e) { console.error(e); }
}

function getDay(date = state.currentDate) {
  if (!state.daily[date]) {
    state.daily[date] = {
      foods: { 아침: [], 점심: [], 저녁: [], 간식: [] },
      weight: null,
      water: 0,
      exercise: [],
      sleep: null,
      conditions: [],
      chat: [],
      photos: []
    };
  }
  // 이전 버전 호환
  if (!state.daily[date].conditions) state.daily[date].conditions = [];
  if (!state.daily[date].chat) state.daily[date].chat = [];
  if (!state.daily[date].photos) state.daily[date].photos = [];
  return state.daily[date];
}

function render() {
  const day = getDay();
  const { main, sub } = formatDate(state.currentDate);
  document.getElementById('date-main').textContent = main;
  document.getElementById('date-sub').textContent = sub;
  document.getElementById('hidden-date').value = state.currentDate;

  // 칼로리 계산
  let cal = 0, c = 0, p = 0, f = 0;
  Object.values(day.foods).forEach(meal => {
    meal.forEach(item => {
      cal += item.cal || 0;
      c += item.c || 0;
      p += item.p || 0;
      f += item.f || 0;
    });
  });

  // 운동 차감
  let exerciseCal = 0;
  day.exercise.forEach(ex => exerciseCal += ex.cal || 0);
  const netCal = cal - exerciseCal;

  document.getElementById('total-cal').textContent = Math.round(netCal);
  document.getElementById('total-c').textContent = Math.round(c);
  document.getElementById('total-p').textContent = Math.round(p);
  document.getElementById('total-f').textContent = Math.round(f);
  document.getElementById('goal-display').textContent = state.settings.goal;

  const macroCal = c * 4 + p * 4 + f * 9;
  document.getElementById('pct-c').textContent = macroCal > 0 ? Math.round(c * 4 / macroCal * 100) + '%' : '0%';
  document.getElementById('pct-p').textContent = macroCal > 0 ? Math.round(p * 4 / macroCal * 100) + '%' : '0%';
  document.getElementById('pct-f').textContent = macroCal > 0 ? Math.round(f * 9 / macroCal * 100) + '%' : '0%';

  // 프로그레스 바
  const pct = Math.min(100, Math.max(0, (netCal / state.settings.goal) * 100));
  const bar = document.getElementById('progress-bar');
  bar.style.width = pct + '%';
  bar.classList.toggle('over', netCal > state.settings.goal);

  // 스탯 카드
  // 체중
  if (day.weight) {
    document.getElementById('weight-val').textContent = day.weight.toFixed(1);
    document.getElementById('weight-unit').textContent = state.settings.weightUnit;
    document.getElementById('weight-trend').textContent = getWeightTrend();
  } else {
    document.getElementById('weight-val').textContent = '—';
    document.getElementById('weight-unit').textContent = '';
    document.getElementById('weight-trend').textContent = '기록하기';
  }

  // 물
  const waterCups = Math.round(day.water / 250);
  document.getElementById('water-val').textContent = waterCups;
  document.getElementById('water-trend').textContent = `${day.water} ml`;

  // 운동
  document.getElementById('exercise-val').textContent = Math.round(exerciseCal);
  const exCount = day.exercise.length;
  document.getElementById('exercise-trend').textContent = exCount > 0 ? `${exCount}회 운동` : '기록하기';

  // 수면
  if (day.sleep) {
    document.getElementById('sleep-val').textContent = day.sleep.hours;
    document.getElementById('sleep-unit').textContent = '시간';
    document.getElementById('sleep-trend').textContent = day.sleep.quality || '';
  } else {
    document.getElementById('sleep-val').textContent = '—';
    document.getElementById('sleep-unit').textContent = '';
    document.getElementById('sleep-trend').textContent = '기록하기';
  }

  // 생리주기
  renderCycle();

  // 몸상태 요약 표시
  renderConditionsSummary();

  // 사진 표시
  renderPhotos();

  // 영상 제작일 알림 (홈)

}

function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      // 압축: 최대 800px, JPEG 0.7 품질 (localStorage 절약)
      const maxDim = 800;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = h * maxDim / w; w = maxDim; }
      else if (h > maxDim) { w = w * maxDim / h; h = maxDim; }
      
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      
      // 사진 종류 물어보기
      const type = prompt('사진 종류를 입력하세요 (예: 음식, 운동, 체중계)', '음식');
      
      const now = new Date();
      const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      
      const day = getDay();
      day.photos.push({
        img: compressed,
        type: type || '기타',
        time: timeStr,
        memo: ''
      });
      
      try {
        saveAll();
        renderPhotos();
      } catch (err) {
        // localStorage 초과 시
        day.photos.pop();
        alert('저장 공간이 부족해요. 오래된 사진을 정리하거나, 영상 만든 후 사진을 삭제해주세요.');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = ''; // 같은 파일 재선택 가능하게
}

function getWeightTrend() {
  const dates = Object.keys(state.daily).filter(d => state.daily[d].weight).sort();
  if (dates.length < 2) return '첫 기록';

  const idx = dates.indexOf(state.currentDate);
  if (idx < 1) return '—';

  const cur = state.daily[state.currentDate].weight;
  const prev = state.daily[dates[idx - 1]].weight;
  const diff = cur - prev;

  if (Math.abs(diff) < 0.05) return '변화 없음';
  const arrow = diff < 0 ? '↓' : '↑';
  const cls = diff < 0 ? 'trend-down' : 'trend-up';
  return `<span class="${cls}">${arrow} ${Math.abs(diff).toFixed(1)}${state.settings.weightUnit}</span>`;
}

function renderCycle() {
  const cycle = state.settings.cycle;
  if (!cycle.lastPeriod) {
    document.getElementById('cycle-indicator').style.display = 'none';
    return;
  }

  const last = new Date(cycle.lastPeriod);
  const cur = new Date(state.currentDate);
  const daysSince = Math.floor((cur - last) / (1000 * 60 * 60 * 24));

  if (daysSince < 0 || daysSince > cycle.length * 2) {
    document.getElementById('cycle-indicator').style.display = 'none';
    return;
  }

  const cycleDay = (daysSince % cycle.length) + 1;
  let phase = '', hint = '';

  if (cycleDay <= cycle.duration) {
    phase = `생리 ${cycleDay}일차`;
    hint = '체중 변동 정상. 무리하지 마세요';
  } else if (cycleDay <= 13) {
    phase = `난포기 ${cycleDay}일차`;
    hint = '✨ 다이어트 황금기. 살 잘 빠지는 시기';
  } else if (cycleDay <= 16) {
    phase = `배란기 ${cycleDay}일차`;
    hint = '식욕 조절 주의. 단백질 위주로';
  } else {
    phase = `황체기 ${cycleDay}일차`;
    hint = '수분 저류로 살 안 빠질 수 있음. 정상';
  }

  document.getElementById('cycle-day-text').textContent = phase;
  document.getElementById('cycle-hint').textContent = hint;
  document.getElementById('cycle-indicator').style.display = 'flex';
}

function renderMeals() {
  const day = getDay();
  const meals = ['아침', '점심', '저녁', '간식'];
  const list = document.getElementById('meal-list');
  list.innerHTML = '';

  let hasAny = false;
  meals.forEach(m => {
    if (day.foods[m].length === 0) return;
    hasAny = true;

    let mealCal = 0;
    day.foods[m].forEach(i => mealCal += i.cal || 0);

    const section = document.createElement('div');
    section.className = 'meal-section';
    section.innerHTML = `
      <div class="meal-header">
        <span class="meal-title">${m}</span>
        <span class="meal-cal">${Math.round(mealCal)} kcal</span>
      </div>
    `;

    day.foods[m].forEach((item, idx) => {
      const div = document.createElement('div');
      div.className = 'food-item';
      div.innerHTML = `
        ${item.time ? `<div class="food-time" onclick="editFoodTime('${m}', ${idx})" title="시간 수정">${item.time}</div>` : `<div class="food-time food-time-empty" onclick="editFoodTime('${m}', ${idx})" title="시간 추가">--:--</div>`}
        <div style="flex:1;min-width:0;">
          <div class="food-name">${item.name}</div>
          <div class="food-detail">${item.portion || ''} · ${Math.round(item.cal)}kcal · 탄${Math.round(item.c||0)} 단${Math.round(item.p||0)} 지${Math.round(item.f||0)}</div>
        </div>
        <button class="food-delete" onclick="deleteFood('${m}', ${idx})" aria-label="삭제">×</button>
      `;
      section.appendChild(div);
    });

    list.appendChild(section);
  });

  // 운동 표시
  if (day.exercise.length > 0) {
    const section = document.createElement('div');
    section.className = 'meal-section';
    section.innerHTML = `
      <div class="meal-header">
        <span class="meal-title">운동</span>
        <span class="meal-cal">-${Math.round(day.exercise.reduce((s,e)=>s+(e.cal||0),0))} kcal</span>
      </div>
    `;
    day.exercise.forEach((ex, idx) => {
      const div = document.createElement('div');
      div.className = 'food-item';
      div.innerHTML = `
        ${ex.time ? `<div class="food-time" onclick="editExerciseTime(${idx})" title="시간 수정">${ex.time}</div>` : `<div class="food-time food-time-empty" onclick="editExerciseTime(${idx})" title="시간 추가">--:--</div>`}
        <div style="flex:1;">
          <div class="food-name">${ex.name}</div>
          <div class="food-detail">${ex.duration}분 · -${Math.round(ex.cal)}kcal${ex.distance ? ` · ${ex.distance}km` : ''}${ex.pace ? ` · ${ex.pace}/km` : ''}${ex.hr ? ` · ♥${ex.hr}` : ''}</div>
        </div>
        <button class="food-delete" onclick="deleteExercise(${idx})">×</button>
      `;
      section.appendChild(div);
    });
    list.appendChild(section);
  }

  document.getElementById('empty-state').style.display = hasAny || day.exercise.length > 0 ? 'none' : 'block';
}

function saveEditTime(type, meal, idx) {
  const newTime = document.getElementById('edit-time-input').value;
  if (type === 'food') {
    getDay().foods[meal][idx].time = newTime;
    // 시간순 재정렬
    getDay().foods[meal].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  } else {
    getDay().exercise[idx].time = newTime;
    getDay().exercise.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  }
  saveAll();
  closeModal();
  render();
}

function showCustomModal(html) {
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal');
  modal.innerHTML = html;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(() => {
    const firstInput = modal.querySelector('input, textarea');
    if (firstInput) firstInput.focus();
  }, 100);
}

// ============================================================
// 날짜 변경
// ============================================================
function changeDate(delta) {
  const d = new Date(state.currentDate);
  d.setDate(d.getDate() + delta);
  state.currentDate = d.toISOString().split('T')[0];
  render();
}

function openDatePicker() {
  const input = document.getElementById('hidden-date');
  input.onchange = e => {
    state.currentDate = e.target.value;
    render();
  };
  input.showPicker ? input.showPicker() : input.click();
}

// ============================================================
// 페이지 전환
// ============================================================
function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const tabBtn = document.querySelector(`.tab[data-page="${page}"]`);
  if (tabBtn) tabBtn.classList.add('active');
  if (page === 'stats') renderStats();
  if (page === 'weight') renderWeightPage();
  if (page === 'coach') renderCoach();
  if (page === 'family') renderFamilyView();
  window.scrollTo(0, 0);
}

// ============================================================
// 모달
// ============================================================
function openModal(type, data) {
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal');
  modal.innerHTML = getModalContent(type, data);
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
  setTimeout(() => {
    if (type === 'exercise') {
      onExerciseTypeChange(); // 러닝 상세 초기 표시 (기본값 슬로우러닝)
    }
    if (type === 'aiPreview') return;
    const firstInput = modal.querySelector('input, textarea');
    if (firstInput) firstInput.focus();
  }, 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

function saveSettings() {
  state.settings.goal = parseInt(document.getElementById('set-goal').value) || 1500;
  state.settings.waterGoal = parseInt(document.getElementById('set-water-goal').value) || 2000;
  const unitBtn = document.querySelector('.btn-quick.active[data-unit], button[data-unit]');
  state.settings.weightUnit = unitBtn?.dataset.unit || state.settings.weightUnit;
  state.settings.cycle.lastPeriod = document.getElementById('set-cycle-date').value || null;
  state.settings.cycle.length = parseInt(document.getElementById('set-cycle-length').value) || 28;
  state.settings.cycle.duration = parseInt(document.getElementById('set-cycle-duration').value) || 5;
  state.settings.apiKey = document.getElementById('set-api-key').value.trim();
  state.settings.openaiKey = document.getElementById('set-openai-key').value.trim();
  saveAll();
  closeModal();
  render();
}

function saveWeight() {
  const v = parseFloat(document.getElementById('weight-input').value);
  if (v > 0) {
    getDay().weight = v;
    saveAll();
  }
  closeModal();
  render();
}

function addWater(ml) {
  const day = getDay();
  day.water = Math.max(0, (day.water || 0) + ml);
  saveAll();
  // 모달 다시 그리기
  document.getElementById('modal').innerHTML = getModalContent('water');
  render();
}

function profile_startWeight() {
  return state.settings.profile && state.settings.profile.startWeight ? state.settings.profile.startWeight : null;
}

function onExerciseTypeChange() {
  const val = document.getElementById('exercise-type').value;
  const isRunning = val.includes('running');
  const detail = document.getElementById('running-detail');
  if (detail) detail.style.display = isRunning ? 'block' : 'none';
}

function saveExercise() {
  const parts = document.getElementById('exercise-type').value.split(',');
  const type = parts[0];
  const met = parts[1];
  const isRunning = parts[2] === 'running';
  const duration = parseFloat(document.getElementById('exercise-duration').value) || 0;
  const weight = parseFloat(document.getElementById('exercise-weight').value) || 60;
  const time = document.getElementById('exercise-time')?.value || '';
  const cal = Math.round(parseFloat(met) * weight * (duration / 60));
  
  const record = { name: type, duration, cal, time };
  
  // 러닝 상세 정보
  if (isRunning) {
    const distance = parseFloat(document.getElementById('run-distance')?.value) || null;
    const hr = parseFloat(document.getElementById('run-hr')?.value) || null;
    if (distance) {
      record.distance = distance;
      // 페이스 계산 (분/km)
      if (duration > 0) {
        const paceMin = duration / distance;
        const pm = Math.floor(paceMin);
        const ps = Math.round((paceMin - pm) * 60);
        record.pace = `${pm}'${String(ps).padStart(2,'0')}"`;
      }
    }
    if (hr) record.hr = hr;
    record.isRunning = true;
  }
  
  getDay().exercise.push(record);
  getDay().exercise.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  saveAll();
  closeModal();
  render();
}

async function analyzeWithAI(text) {
  if (!state.settings.apiKey) {
    openModal('apiKey');
    return;
  }

  const status = document.getElementById('ai-status');
  status.style.display = 'block';
  status.className = 'ai-status';
  status.textContent = '✦ AI가 음식을 분석하고 있어요...';

  const hour = new Date().getHours();
  let defaultMeal = '간식';
  if (hour < 10) defaultMeal = '아침';
  else if (hour < 14) defaultMeal = '점심';
  else if (hour < 19) defaultMeal = '저녁';

  const prompt = `사용자가 먹은 한국 음식을 분석해서 JSON으로만 응답하세요. 다른 설명 절대 금지, 순수 JSON만.

입력: "${text}"

규칙:
- 끼니(meal)는 "아침", "점심", "저녁", "간식" 중 하나. 언급 없으면 "${defaultMeal}".
- 시간(time)은 "HH:MM" 형식. 사용자가 "아침 8시", "오후 2시", "저녁 7시반" 같이 언급하면 추출. 없으면 빈 문자열 "".
  - "아침"="07:30", "점심"="12:30", "저녁"="19:00", "오후 4시"="16:00" 정도로 추정 가능
- 한국인 표준 1인분 기준으로 칼로리/영양소 추정.
- 수량이 명시되면 반영 (예: "공기밥 2그릇" = 칼로리 2배).
- 영양소는 g 단위 정수.

응답 형식 (JSON만, 마크다운 없이):
{
  "items": [
    {"name": "음식이름", "portion": "1인분/100g/1그릇 등", "meal": "아침|점심|저녁|간식", "time": "HH:MM 또는 빈문자열", "cal": 칼로리, "c": 탄수g, "p": 단백g, "f": 지방g}
  ]
}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.settings.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 4096,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.text();
      throw new Error(`API 오류: ${response.status} - ${err.substring(0, 100)}`);
    }

    const data = await response.json();
    let responseText = data.content
      .filter(item => item.type === "text")
      .map(item => item.text)
      .join("");

    responseText = responseText.replace(/```json|```/g, '').trim();
    
    // JSON 파싱 시도 - 잘린 응답에도 대응
    let parsed;
    try {
      parsed = JSON.parse(responseText);
    } catch (parseErr) {
      // 응답이 잘렸을 가능성 - 마지막 완전한 } 까지 잘라서 재시도
      console.warn('JSON 파싱 실패, 복구 시도:', parseErr.message);
      
      // items 배열에서 완전한 객체들만 추출
      const itemsMatch = responseText.match(/"items"\s*:\s*\[/);
      if (itemsMatch) {
        const startIdx = itemsMatch.index + itemsMatch[0].length;
        const objects = [];
        let depth = 0;
        let currentStart = -1;
        let inString = false;
        let escapeNext = false;
        
        for (let i = startIdx; i < responseText.length; i++) {
          const ch = responseText[i];
          
          if (escapeNext) { escapeNext = false; continue; }
          if (ch === '\\') { escapeNext = true; continue; }
          if (ch === '"') { inString = !inString; continue; }
          if (inString) continue;
          
          if (ch === '{') {
            if (depth === 0) currentStart = i;
            depth++;
          } else if (ch === '}') {
            depth--;
            if (depth === 0 && currentStart !== -1) {
              try {
                const obj = JSON.parse(responseText.substring(currentStart, i + 1));
                objects.push(obj);
              } catch (e) {}
              currentStart = -1;
            }
          }
        }
        
        if (objects.length > 0) {
          parsed = { items: objects };
          console.log(`응답이 잘렸지만 ${objects.length}개 음식 복구됨`);
        } else {
          throw new Error('AI 응답을 파싱할 수 없어요. 음식 개수를 줄여서 다시 시도해주세요.');
        }
      } else {
        throw new Error('AI 응답 형식이 올바르지 않아요. 다시 시도해주세요.');
      }
    }

    if (!parsed.items || parsed.items.length === 0) {
      status.className = 'ai-status error';
      status.textContent = '음식을 인식하지 못했어요. 더 구체적으로 적어주세요.';
      return;
    }

    status.style.display = 'none';
    openModal('aiPreview', parsed);

  } catch (err) {
    console.error(err);
    status.className = 'ai-status error';
    status.textContent = `오류: ${err.message}`;
  }
}

// ============================================================
// 음성 인식 (Whisper API 우선, 폴백으로 브라우저 기본)
// ============================================================
let recognition = null;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let recordingMode = 'browser'; // 'whisper' or 'browser'
let manualStop = false; // 사용자가 버튼을 눌러 직접 멈췄는지
let browserTranscript = ''; // 확정된 누적 텍스트 (이전 세션들)
let restartTimer = null;

function setupSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.continuous = true;      // 계속 듣기
  recognition.interimResults = true;

  recognition.onresult = (event) => {
    // 이번 세션에서 확정된(final) 부분과 임시(interim) 부분 분리
    let sessionFinal = '';
    let interim = '';
    for (let i = 0; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) sessionFinal += t;
      else interim += t;
    }
    // 누적 텍스트 = 이전 세션들(browserTranscript) + 이번 세션 확정분
    // 임시로 화면 표시는 안 하고 라벨만 갱신
    if (sessionFinal) {
      browserTranscript = (browserTranscript + ' ' + sessionFinal).trim();
    }
    const label = document.getElementById('voice-label');
    if (label) label.textContent = '듣는 중... (다 말하면 다시 누르기)';
  };

  recognition.onend = () => {
    // 사용자가 직접 멈춘 게 아니면 자동 재시작 (안드로이드가 멋대로 끊는 것 방지)
    // 즉시 start()는 안드로이드에서 막히므로 약간의 딜레이 후 재시작
    if (isRecording && !manualStop) {
      clearTimeout(restartTimer);
      restartTimer = setTimeout(() => {
        if (isRecording && !manualStop) {
          try { recognition.start(); } catch (e) {}
        }
      }, 250);
      return;
    }
    // 진짜 종료: 누적된 텍스트를 입력창에 표시
    finishBrowserRecording();
  };

  recognition.onerror = (e) => {
    // no-speech, network 등 일시 오류는 재시작으로 버팀
    if (isRecording && !manualStop && e.error !== 'not-allowed' && e.error !== 'service-not-allowed' && e.error !== 'aborted') {
      clearTimeout(restartTimer);
      restartTimer = setTimeout(() => {
        if (isRecording && !manualStop) {
          try { recognition.start(); } catch (err) {}
        }
      }, 250);
      return;
    }
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      const status = document.getElementById('ai-status');
      if (status) { status.style.display='block'; status.className='ai-status error'; status.textContent='마이크 권한을 허용해주세요'; }
    }
    finishBrowserRecording();
  };
}

function finishBrowserRecording() {
  isRecording = false;
  clearTimeout(restartTimer);
  const input = document.getElementById('ai-input');
  if (input && browserTranscript) input.value = browserTranscript.trim();
  const btn = document.getElementById('voice-btn');
  if (btn) btn.classList.remove('recording');
  const label = document.getElementById('voice-label');
  if (label) label.textContent = '음성';
  const status = document.getElementById('ai-status');
  if (status && browserTranscript) {
    status.style.display = 'block';
    status.className = 'ai-status';
    status.textContent = '✓ 인식 완료! 내용을 확인하고 "AI 분석"을 눌러주세요.';
  } else if (status && !browserTranscript) {
    status.style.display = 'block';
    status.className = 'ai-status error';
    status.textContent = '음성이 인식되지 않았어요. 다시 시도하거나 직접 입력해주세요.';
  }
}

async function startWhisperRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    
    // 브라우저 호환 mime type 찾기
    const mimeTypes = ['audio/webm', 'audio/webm;codecs=opus', 'audio/mp4', 'audio/ogg'];
    let mimeType = '';
    for (const mt of mimeTypes) {
      if (MediaRecorder.isTypeSupported(mt)) {
        mimeType = mt;
        break;
      }
    }
    
    mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
    audioChunks = [];
    
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(track => track.stop());
      const audioBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
      await transcribeWithWhisper(audioBlob);
    };
    
    mediaRecorder.start();
    isRecording = true;
    recordingMode = 'whisper';
    document.getElementById('voice-btn').classList.add('recording');
    document.getElementById('voice-label').textContent = '듣는 중... (다 말하면 다시 누르기)';
    document.getElementById('ai-input').value = '';
    const status = document.getElementById('ai-status');
    status.style.display = 'block';
    status.className = 'ai-status';
    status.textContent = '🎤 녹음 중이에요. 천천히 말씀하시고, 다 끝나면 음성 버튼을 다시 누르세요.';
    
  } catch (err) {
    console.error('마이크 접근 실패:', err);
    const status = document.getElementById('ai-status');
    status.style.display = 'block';
    status.className = 'ai-status error';
    status.textContent = '마이크 접근 권한이 필요해요';
  }
}

async function transcribeWithWhisper(audioBlob) {
  const status = document.getElementById('ai-status');
  status.style.display = 'block';
  status.className = 'ai-status';
  status.textContent = '✦ 음성을 텍스트로 변환 중...';
  
  try {
    const formData = new FormData();
    formData.append('file', audioBlob, 'audio.webm');
    formData.append('model', 'whisper-1');
    formData.append('language', 'ko');
    formData.append('prompt', '한국 음식, 칼로리, 식단 기록. 김치찌개, 비빔밥, 된장찌개, 공기밥, 떡볶이, 라면, 김밥, 닭가슴살, 두부, 계란, 사과, 바나나, 아메리카노, 라떼, 우유, 요거트, 샐러드, 후무스, 크래커, 고사리, 숙주, 버섯, 오이지.');
    
    const response = await fetch('https://api.openai.com/v1/audio/transcriptions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${state.settings.openaiKey}`
      },
      body: formData
    });
    
    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`Whisper API 오류 (${response.status})`);
    }
    
    const data = await response.json();
    document.getElementById('ai-input').value = data.text || '';
    status.style.display = 'none';
    
  } catch (err) {
    console.error(err);
    status.className = 'ai-status error';
    status.textContent = `음성 변환 오류: ${err.message}`;
  }
}

document.getElementById('voice-btn').onclick = async () => {
  // 녹음 중이면 종료
  if (isRecording) {
    if (recordingMode === 'whisper' && mediaRecorder) {

function gatherContext(days = 7) {
  // 최근 N일 데이터를 컨텍스트로 정리
  const today = new Date(state.currentDate);
  const data = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const day = state.daily[ds];
    if (!day) continue;
    
    let cal = 0, c = 0, p = 0, f = 0, exCal = 0;
    const foodList = [];
    Object.entries(day.foods || {}).forEach(([meal, items]) => {
      items.forEach(item => {
        cal += item.cal || 0;
        c += item.c || 0;
        p += item.p || 0;
        f += item.f || 0;
        foodList.push(`${meal}(${item.time||'?'}) ${item.name}`);
      });
    });
    (day.exercise || []).forEach(e => exCal += e.cal || 0);
    
    const conditions = (day.conditions || []).map(c => `${c.time}: ${(c.tags||[]).join(',')}${c.note ? ' "'+c.note+'"' : ''}`);
    
    data.push({
      date: ds,
      isToday: ds === state.currentDate,
      cal: Math.round(cal), c: Math.round(c), p: Math.round(p), f: Math.round(f),
      exCal: Math.round(exCal),
      weight: day.weight,
      water: day.water,
      sleep: day.sleep,
      foods: foodList,
      conditions: conditions
    });
  }
  return data;
}

  const proteinGoal = getProteinGoal(profile);
  const exList = (day.exercise||[]).map(e => `${e.name} ${e.duration}분${e.distance?' '+e.distance+'km':''}`).join(', ');
  const condList = (day.conditions||[]).map(c => `${c.time} ${(c.tags||[]).join(',')}${c.note?' "'+c.note+'"':''}`).join(' | ');
  
  let ctx = `[사용자 프로필]\n`;
  if (profile.name) ctx += `이름: ${profile.name}\n`;
  const goalTypeLabel = { loss: '감량(살빼기)', maintain: '체중유지', gain: '증량(근육늘리기)' }[profile.goalType || 'loss'];
  ctx += `목표: ${goalTypeLabel}\n`;
  if (profile.height) ctx += `키 ${profile.height}cm, 현재 ${profile.startWeight}kg → 목표 ${profile.targetWeight}kg\n`;
  ctx += `하루 목표: ${state.settings.goal}kcal, 단백질 권장 ${proteinGoal}g\n`;
  if (profile.avoidFoods) ctx += `못 먹는 음식: ${profile.avoidFoods}\n`;
  if (profile.preferredStyle && profile.preferredStyle.length) ctx += `선호: ${profile.preferredStyle.join(',')}\n`;
  
  ctx += `\n[오늘 ${state.currentDate} 현황]\n`;
  ctx += `섭취 칼로리: ${Math.round(cal)}kcal (운동 -${Math.round(exCal)}, 순 ${Math.round(cal-exCal)}kcal)\n`;
  ctx += `단백질 ${Math.round(p)}/${proteinGoal}g, 탄수 ${Math.round(c)}g, 지방 ${Math.round(f)}g\n`;
  ctx += `먹은 음식: ${foodList.join('; ') || '없음'}\n`;
  if (exList) ctx += `운동: ${exList}\n`;
  if (day.weight) ctx += `체중: ${day.weight}kg\n`;
  if (day.water) ctx += `물: ${day.water}ml\n`;
  if (day.sleep) ctx += `수면: ${day.sleep.hours}시간 ${day.sleep.quality}\n`;
  if (condList) ctx += `몸상태: ${condList}\n`;
  
  return ctx;
}

// AI 코치와 대화 (질문 보내기)
async function sendCoachMessage(userText, options = {}) {
  if (!userText || !userText.trim()) return;
  if (!state.settings.apiKey) { openModal('apiKey'); return; }
  
  const day = getDay();
  // 사용자 메시지 저장
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  day.chat.push({ role: 'user', text: userText.trim(), time: timeStr });
  await saveAll();
  if (options.onUpdate) options.onUpdate();
  
  try {
    const context = buildCoachContext();
    // 최근 대화 히스토리 (최대 10개)
    const history = day.chat.slice(-10).map(m => `${m.role === 'user' ? '사용자' : '코치'}: ${m.text}`).join('\n');
    
    const prompt = `당신은 따뜻하고 전문적인 한국인 다이어트 영양 코치입니다. 사용자의 실제 데이터를 바탕으로 친근하게 대화하세요.

${context}

[지금까지 대화]
${history}

[지침]
- 사용자의 실제 섭취 데이터(칼로리, 단백질, 지방 등)를 근거로 구체적으로 답하세요.
- 특정 음식의 양을 언급하면 영양소를 계산해서 피드백하세요. 예: "브리치즈 90g은 지방 약 27g이라 오늘 지방이 높아진 이유예요. 50g으로 줄이면 좋겠어요."
- 부족한 영양소가 있으면 채울 음식을 추천하세요.
- 따뜻하지만 솔직하게. 칭찬할 건 칭찬하고 고칠 건 부드럽게 지적.
- 2-4문장으로 간결하게. 이모지는 적당히.
- 의학적 진단은 하지 말고, 일반적 영양 조언만.

사용자의 마지막 질문에 답하세요.`;

    const reply = await callClaude(prompt, 1024);
    day.chat.push({ role: 'coach', text: reply.trim(), time: timeStr });
    await saveAll();
    if (options.onUpdate) options.onUpdate();
    if (options.speak && state.settings.profile.voiceEnabled !== false) {
      speakText(reply.trim());
    }
  } catch (err) {
    console.error(err);
    day.chat.push({ role: 'coach', text: `죄송해요, 오류가 났어요: ${err.message}`, time: timeStr });
    await saveAll();
    if (options.onUpdate) options.onUpdate();
  }
}

// 기록된 날 수 세기 (음식/체중/운동 중 하나라도 있으면 기록일)
function countRecordedDays(days = 14) {
  const data = gatherContext(days);
  return data.filter(d => d.cal > 0 || d.weight || d.exCal > 0 || (d.conditions && d.conditions.length > 0)).length;
}

async function runAutoDiagnosis(force = false) {
  if (!state.settings.apiKey) { openModal('apiKey'); return; }
  
  const recordedDays = countRecordedDays(14);
  if (recordedDays < 3 && !force) {
    return; // 데이터 부족
  }
  
  const card = document.getElementById('auto-diagnosis-card');
  if (card) {
    card.innerHTML = `
      <div class="coach-title"><span>🩺</span> AI 자동 진단</div>
      <div style="text-align:center;padding:20px;color:var(--ink-soft);font-size:13px;">
        <div style="font-size:24px;margin-bottom:8px;">🔍</div>
        지난 ${recordedDays}일 데이터를 분석하고 있어요...
      </div>
    `;
  }
  
  try {
    const profile = state.settings.profile;
    const weekData = gatherContext(14);
    const goalTypeLabel = { loss: '감량', maintain: '유지', gain: '증량(근육)' }[profile.goalType || 'loss'];
    
    // 데이터 요약
    const recorded = weekData.filter(d => d.cal > 0 || d.weight);
    const avgCal = Math.round(recorded.reduce((s,d)=>s+d.cal,0) / (recorded.length||1));
    const avgP = Math.round(recorded.reduce((s,d)=>s+d.p,0) / (recorded.length||1));
    const avgF = Math.round(recorded.reduce((s,d)=>s+d.f,0) / (recorded.length||1));
    const avgC = Math.round(recorded.reduce((s,d)=>s+d.c,0) / (recorded.length||1));
    const weights = recorded.filter(d=>d.weight).map(d=>({date:d.date,w:d.weight}));
    const proteinGoal = getProteinGoal(profile);
    
    let dataText = `[목표] ${goalTypeLabel}\n`;
    dataText += `[기간] 최근 ${recorded.length}일 기록\n`;
    dataText += `[평균 섭취] ${avgCal}kcal/일 (목표 ${state.settings.goal})\n`;
    dataText += `[평균 영양] 단백질 ${avgP}g(목표 ${proteinGoal}), 탄수 ${avgC}g, 지방 ${avgF}g\n`;
    if (weights.length >= 2) {
      dataText += `[체중 변화] ${weights[0].w}kg → ${weights[weights.length-1].w}kg\n`;
    }
    // 날짜별 간단 기록
    dataText += `\n[일별 상세]\n`;
    recorded.forEach(d => {
      dataText += `${d.date}: ${d.cal}kcal(단${d.p}/탄${d.c}/지${d.f}), 운동-${d.exCal}`;
      if (d.weight) dataText += `, ${d.weight}kg`;
      if (d.conditions && d.conditions.length) dataText += `, 몸상태:${d.conditions.join('/')}`;
      dataText += `\n`;
    });
    
    const prompt = `당신은 전문 다이어트 영양 코치입니다. 사용자의 누적 데이터를 분석해서 패턴을 찾고 구체적인 처방을 내려주세요.

${dataText}

다음 형식으로 진단해주세요:

📊 데이터로 본 나의 패턴
(2-3가지 발견. 예: "단백질이 매일 목표보다 30g 부족", "주말에 칼로리가 평일보다 500kcal 많음", "지방 비중이 높은 편")

🎯 핵심 문제
(가장 중요한 1가지를 콕 집어서)

✅ 이렇게 해보세요
(구체적이고 실천 가능한 제안 2-3가지. 음식 이름과 양을 구체적으로. 목표가 ${goalTypeLabel}임을 고려)

실제 숫자를 근거로, 따뜻하지만 솔직하게. 의학적 진단은 하지 마세요. 각 항목은 2-3문장 이내로 간결하게.`;

    const reply = await callClaude(prompt, 2000);
    
    // 진단 결과 저장 (날짜별 1회 캐시)
    const day = getDay();
    day.autoDiagnosis = { text: reply.trim(), date: state.currentDate, recordedDays };
    await saveAll();
    
    renderAutoDiagnosisCard();
    if (state.settings.profile.voiceEnabled !== false) {
      speakText(reply.trim().replace(/[📊🎯✅]/g, ''));
    }
  } catch (err) {
    console.error(err);
    if (card) {
      card.innerHTML = `
        <div class="coach-title"><span>🩺</span> AI 자동 진단</div>
        <div style="color:var(--rose);font-size:13px;padding:10px;">분석 중 오류: ${err.message}</div>
        <button class="coach-action-btn" onclick="runAutoDiagnosis(true)"><span>🔄</span><span>다시 시도</span></button>
      `;
    }
  }
}

// 영상 제작일 알림 배너 (수요일=3, 일요일=0)
function getYoutubeReminderBanner() {
  const today = new Date(state.currentDate);

  const isVideoDay = (dow === 0 || dow === 3);
  if (!isVideoDay) return '';
  
  // 오늘 이미 대본 만들었으면 알림 안 띄움
  const day = getDay();
  if (day.videoScriptMade) {

  }
  
  // 사진/데이터 개수 체크
  const photoCount = countWeekPhotos();
  const dayName = dow === 0 ? '일요일' : '수요일';
  return `<div style="background:linear-gradient(135deg,var(--accent-bg),var(--gold-bg));padding:12px;border-radius:var(--radius-sm);margin-bottom:12px;border:1px solid var(--accent-soft);">
    <div style="font-size:13px;font-weight:500;color:var(--accent);margin-bottom:4px;">🔔 오늘은 ${dayName}, 영상 만드는 날이에요!</div>
    <div style="font-size:11px;color:var(--ink-soft);">이번 주에 사진 ${photoCount}장을 모았어요. 아래 버튼으로 대본을 만들어보세요.</div>
  </div>`;
}

function countWeekPhotos() {
  let count = 0;
  for (let i = 6; i >= 0; i--) {
    const d = new Date(state.currentDate);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const dayData = state.daily[ds];
    if (dayData && dayData.photos) count += dayData.photos.length;
  }
  return count;
}

async function generateVideoScript(type) {
  if (!state.settings.apiKey) { openModal('apiKey'); return; }
  
  const btn = event?.target?.closest('button');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span>⏳</span><span>대본 작성 중...</span>'; }
  
  try {
    // 최근 7일 데이터 + 사진 수집

    const recorded = weekData.filter(d => d.cal > 0 || d.weight || (d.photos && d.photos.length));
    const profile = state.settings.profile;
    const goalTypeLabel = { loss: '감량', maintain: '유지', gain: '근육 증량' }[profile.goalType || 'loss'];
    
    // 사진 정보 수집 (이미지 자체가 아닌 메타데이터만)

    for (let i = 6; i >= 0; i--) {
      const d = new Date(state.currentDate);
      d.setDate(d.getDate() - i);
      const ds = d.toISOString().split('T')[0];
      const dayData = state.daily[ds];
      if (dayData && dayData.photos) {
        dayData.photos.forEach(p => {
          photoList.push(`${ds} ${p.time} [${p.type}]${p.memo ? ' '+p.memo : ''}`);

    // 데이터 요약

    const proteinGoal = getProteinGoal(profile);
    const weights = recorded.filter(d=>d.weight).map(d=>d.weight);

다음 형식으로 쇼츠 대본을 작성하세요:

${dataText}

다음 형식으로 영상 대본을 작성하세요:

    </div>
    <div style="background:var(--bg-secondary);padding:14px;border-radius:var(--radius-sm);font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:55vh;overflow-y:auto;margin-bottom:14px;">${script.replace(/</g,'&lt;')}</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">닫기</button>
      <button class="btn btn-primary" onclick="copyVideoScript(this)" data-script="${encodeURIComponent(script)}">📋 대본 복사</button>
    </div>
  `;
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function copyVideoScript(btn) {
  const script = decodeURIComponent(btn.dataset.script);
  navigator.clipboard.writeText(script).then(() => {
    btn.textContent = '✓ 복사됨!';
    setTimeout(() => { btn.textContent = '📋 대본 복사'; }, 2000);
  }).catch(() => {
    // 폴백
    const ta = document.createElement('textarea');
    ta.value = script; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.textContent = '✓ 복사됨!';
    setTimeout(() => { btn.textContent = '📋 대본 복사'; }, 2000);
  });
}

function renderAutoDiagnosisCard() {
  const card = document.getElementById('auto-diagnosis-card');
  if (!card) return;
  
  const recordedDays = countRecordedDays(14);
  const day = getDay();
  const cached = day.autoDiagnosis;
  
  // 데이터 부족
  if (recordedDays < 3) {
    card.innerHTML = `
      <div class="coach-title"><span>🩺</span> AI 자동 진단</div>
      <div style="font-size:13px;color:var(--ink-soft);line-height:1.6;padding:10px 0;">

        <div style="margin-top:8px;height:6px;background:var(--bg-primary);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${Math.min(100,recordedDays/3*100)}%;background:var(--accent);"></div>
        </div>
      </div>
